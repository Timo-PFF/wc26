  // Log into a linked account (same person, another league) without its password.
  async function switchToLink(league, name) {
    if (!AUTH || SCRIPT_URL.startsWith('PASTE')) return;
    try {
      const res = await fetch(SCRIPT_URL, { method: 'POST',
        body: JSON.stringify({ action: 'switchLink', token: AUTH.token, league: league, name: name }) });
      const data = await res.json();
      if (!data.ok) { msg(t('switchFailed'), 'err'); showTab('predict'); return; }
      const lg = findLeague(data.league);
      if (lg) { LEAGUE = lg.id; LEAGUE_NAME = lg.name; }
      AUTH = { name: data.name, token: data.token, links: data.links || [] };
      saveToken(data.league, data.token);
      saveLastLeague(data.league);
      guessesLoaded = false; playersLoaded = false;
      document.getElementById('leagueSelect').value = LEAGUE;
      try { setPlayers(await loadPlayers(true)); } catch (e) { /* keep last list */ }
      document.getElementById('player').value = data.name;
      document.getElementById('submitBtn').disabled = false;
      await syncPlayer();                 // badge + this account's prefilled picks
      renderMatches();                    // re-render the pick tab for the new account
      const tab = visibleDataTab(); if (tab) await tab.onShow();
      showTab('predict');
    } catch (e) { msg(t('switchFailed'), 'err'); }
  }

  // Notice on the pick tab when logged out: you can browse games/odds, but you
  // need to log in to actually submit picks. Same style as the error message.
  function updateLoginNotice() {
    const el = document.getElementById('loginNotice');
    if (!el) return;
    if (AUTH) { el.textContent = ''; el.className = 'msg'; }
    else { el.textContent = t('loginToPick'); el.className = 'msg err'; }
  }

  // Group matches into ordered sections: each group letter, then each knockout
  // stage. Returns [{title, matches:[...]}] in chronological-ish stage order.
  function sectionize(matches) {
    const sections = new Map();   // key -> {title, order, matches:[]}
    matches.forEach(m => {
      const stage = m.stage || {};
      let key, title, order;
      if (m.group) {                              // group-stage match with a known group
        key = 'group-' + m.group; title = t('group') + ' ' + m.group; order = 0;
      } else if (stage.slug === 'group-stage') {  // group stage but group not resolved yet
        key = 'group-?'; title = t('groupStageTBD'); order = 1;
      } else {                                    // knockout round
        key = stage.slug || 'knockout';
        title = stageLabel(stage);
        order = 2;
      }
      if (!sections.has(key)) sections.set(key, { key, title, order, matches: [] });
      sections.get(key).matches.push(m);
    });
    // Order: group sections first (alphabetical: Group A, B, …), then knockout
    // rounds in chronological order (R32 → R16 → … → Final), keyed off each
    // round's earliest kickoff so we don't have to hard-code the bracket order.
    const minDate = s => s.matches.reduce(
      (min, m) => (m.date && (!min || m.date < min)) ? m.date : min, '');
    return [...sections.values()].sort((a, b) =>
      a.order - b.order ||
      (a.order === 0 ? a.title.localeCompare(b.title) : minDate(a).localeCompare(minDate(b))));
  }

  // Chronological view: one section per calendar day (in LOCAL time, so the day
  // heading agrees with the local kickoff time shown on each card), days ordered
  // by kickoff. Matches with no date sink to a "Date TBD" section at the end.
  function sectionizeByDate(matches) {
    const sorted = [...matches].sort((a, b) =>
      (a.date || '￿').localeCompare(b.date || '￿'));   // null dates last
    const sections = new Map();
    sorted.forEach(m => {
      const d = kickoffDate(m.date);
      const key = d ? d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate() : 'tbd';
      const title = d
        ? d.toLocaleDateString(localeTag(), { weekday: 'long', month: 'long', day: 'numeric' })
        : t('dateTBD');
      if (!sections.has(key)) sections.set(key, { title, matches: [] });
      sections.get(key).matches.push(m);
    });
    return [...sections.values()];   // Map keeps insertion order = chronological
  }

  // Snapshot scores already typed (+ any penalty-winner pick) so a view switch
  // that rebuilds the DOM doesn't lose them. Returns { matchId: {home, away, pen} }.
  function captureDrafts() {
    const drafts = {};
    document.querySelectorAll('#matches input[data-id]').forEach(inp => {
      if (inp.value === '') return;
      const id = inp.dataset.id;
      (drafts[id] = drafts[id] || {})[inp.dataset.side] = inp.value;
    });
    document.querySelectorAll('#matches .penbtn.active').forEach(b => {
      const id = b.dataset.id;
      (drafts[id] = drafts[id] || {}).pen = b.dataset.side;
    });
    return drafts;
  }

  function applyDrafts(drafts) {
    Object.keys(drafts).forEach(id => {
      ['home', 'away'].forEach(side => {
        if (drafts[id][side] == null) return;
        const inp = document.querySelector('#matches input[data-id="' + id + '"][data-side="' + side + '"]');
        if (inp) inp.value = drafts[id][side];
      });
      if (drafts[id].pen) setPenaltyPick(id, drafts[id].pen);
    });
  }

  // Set/clear the active penalty-winner button for a match, and show/hide the
  // "who wins on penalties?" row based on whether the current pick is a draw.
  function setPenaltyPick(id, side) {
    document.querySelectorAll('#matches .penbtn[data-id="' + id + '"]').forEach(b =>
      b.classList.toggle('active', !!side && b.dataset.side === side));
  }
  function updatePenRow(id) {
    const row = document.querySelector('#matches .penrow[data-id="' + id + '"]');
    if (!row) return;
    const h = document.querySelector('#matches input[data-id="' + id + '"][data-side="home"]');
    const a = document.querySelector('#matches input[data-id="' + id + '"][data-side="away"]');
    const draw = h && a && h.value !== '' && a.value !== '' && parseInt(h.value, 10) === parseInt(a.value, 10);
    row.style.display = draw ? '' : 'none';
  }
  // One-time delegated handlers on the (persistent) #matches container.
  function setupPenListeners() {
    const wrap = document.getElementById('matches');
    wrap.addEventListener('input', e => { if (e.target.matches('input[data-id]')) updatePenRow(e.target.dataset.id); });
    wrap.addEventListener('click', e => {
      const b = e.target.closest('.penbtn');
      if (b) setPenaltyPick(b.dataset.id, b.dataset.side);
    });
  }

  // American moneyline ("-230", "+700") → raw implied win probability (0..1).
  function mlToProb(ml) {
    if (ml == null) return null;
    const n = parseInt(String(ml).replace('+', ''), 10);
    if (isNaN(n) || n === 0) return null;
    return n > 0 ? 100 / (n + 100) : -n / (-n + 100);
  }

  // {home, away, draw} moneylines → vig-free probabilities that sum to 1.
  // Returns null unless all three legs are present (can't de-vig otherwise).
  function impliedProbs(moneyline) {
    if (!moneyline) return null;
    const h = mlToProb(moneyline.home), a = mlToProb(moneyline.away), d = mlToProb(moneyline.draw);
    if (h == null || a == null || d == null) return null;
    const sum = h + a + d;
    if (sum <= 0) return null;
    return { home: h / sum, away: a / sum, draw: d / sum };
  }

  // Round the three probabilities to whole percents that still sum to exactly
  // 100 (largest-remainder method) — naive per-value rounding can yield 99/101.
  // Returns { home, away, draw } as integers.
  function pctTrio(probs) {
    const parts = ['home', 'away', 'draw'].map(key => {
      const v = probs[key] * 100;
      return { key, base: Math.floor(v), frac: v - Math.floor(v) };
    });
    let leftover = 100 - parts.reduce((s, p) => s + p.base, 0);
    parts.sort((a, b) => b.frac - a.frac);            // hand spare points to biggest remainders
    for (let i = 0; i < parts.length && leftover > 0; i++, leftover--) parts[i].base += 1;
    const out = {};
    parts.forEach(p => { out[p.key] = p.base; });
    return out;
  }

  function oddsLabel(odds) {
    if (!odds) return '';
    const bits = [];
    if (odds.details) bits.push(odds.details);
    if (odds.overUnder != null) bits.push('O/U ' + odds.overUnder);
    return bits.length ? '<span class="odds">' + escapeHtml(bits.join(' · ')) + '</span>' : '';
  }

  function teamCell(side, sideClass) {
    const logo = teamLogo(side);
    const img = logo ? '<img class="flag" src="' + escapeHtml(logo) + '" alt="" loading="lazy" />' : '';
    const name = '<span class="name"><span class="full">' + escapeHtml(teamName(side)) +
                 '</span><span class="abbr">' + escapeHtml(teamAbbr(side)) + '</span></span>';
    // Away side puts the logo on the right of the name for symmetry.
    const inner = sideClass === 'away' ? name + img : img + name;
    return '<div class="team ' + sideClass + '">' + inner + '</div>';
  }

  function renderMatches() {
    const wrap = document.getElementById('matches');
    if (!MATCHES.length) { wrap.innerHTML = '<div class="card">' + escapeHtml(t('noMatches')) + '</div>'; return; }
    const drafts = captureDrafts();   // keep unsaved scores across a view switch
    wrap.innerHTML = '';
    lockSignature = MATCHES.filter(isLocked).map(m => m.id).join(',');
    renderGroupFilter();   // the per-group/stage chips (group view only)

    // Pick-tab filter checkboxes (each independent; they compose).
    let visible = HIDE_STARTED ? MATCHES.filter(m => !isLocked(m)) : MATCHES;
    if (ONLY_UPCOMING) {
      const now = Date.now();
      visible = visible.filter(m => {
        if (isLocked(m)) return false;
        const ko = kickoffDate(m.date);
        return ko && ko.getTime() - now <= COUNTDOWN_SOON_MS;
      });
    }
    if (ONLY_NOPICK || ONLY_MYPICK) {
      const picked = new Set((AUTH ? SHEET.guesses.filter(g => g.player === AUTH.name) : []).map(g => g.matchId));
      visible = visible.filter(m => ONLY_MYPICK ? picked.has(m.id) : !picked.has(m.id));
    }
    if (!visible.length) {
      let note;
      if (ONLY_UPCOMING && ONLY_NOPICK) {
        // Upcoming + unpicked is empty → you've picked everything coming up soon.
        note = t('allUpcomingPicked')(Math.round(COUNTDOWN_SOON_MS / (60 * 60 * 1000)));
      } else {
        const filtered = HIDE_STARTED || ONLY_UPCOMING || ONLY_NOPICK || ONLY_MYPICK;
        note = t(filtered ? 'noUpcomingMatch' : 'noMatches');
      }
      wrap.innerHTML = '<div class="card">' + escapeHtml(note) + '</div>';
      return;
    }

    let sections = VIEW_MODE === 'date' ? sectionizeByDate(visible) : sectionize(visible);
    // In group view, drop sections the user toggled off via the chips.
    if (VIEW_MODE === 'group') sections = sections.filter(s => !HIDDEN_GROUPS.has(s.key));
    if (!sections.length) {
      wrap.innerHTML = '<div class="card">' + escapeHtml(t('allHidden')) + '</div>';
      return;
    }
    sections.forEach(section => {
      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = '<h2>' + escapeHtml(section.title) + '</h2>' +
                       '<span class="count">' + escapeHtml(t('matchCount')(section.matches.length)) + '</span>';
      wrap.appendChild(head);

      section.matches.forEach(m => {
        const finished = isFinished(m);
        const locked = isLocked(m);   // disabled if scored OR kicked off
        const hs = homeScore(m), as = awayScore(m);
        const card = document.createElement('div');
        card.className = 'card match';

        const metaBits = [];
        if (m.date) metaBits.push(escapeHtml(kickoffLabel(m.date)));
        if (m.venue && m.venue.fullName) {
          const v = [m.venue.fullName, m.venue.city, m.venue.country].filter(Boolean).join(', ');
          metaBits.push(escapeHtml(v));
        }
        const odds = oddsLabel(m.odds);
        if (odds) metaBits.push(odds);
        // Live "Starts in …" countdown, shown first, for games not yet locked.
        if (!locked) {
          const ko = kickoffDate(m.date);
          if (ko) {
            const ms = ko.getTime() - Date.now();
            metaBits.unshift('<span class="countdown' + (ms <= COUNTDOWN_SOON_MS ? ' soon' : '') +
              '" data-ko="' + ko.getTime() + '">' + escapeHtml(fmtCountdown(ms)) + '</span>');
          }
        }

        // Vig-free win probabilities shown above each input (draw above "vs"),
        // rounded so the three percents add up to exactly 100.
        const p = impliedProbs(m.odds && m.odds.moneyline);
        const pct = p ? pctTrio(p) : null;
        const prob = side => pct ? '<div class="prob">' + pct[side] + '%</div>' : '';
        const input = side =>
          '<input type="number" min="0" max="99" inputmode="numeric" data-id="' +
          escapeHtml(m.id) + '" data-side="' + side + '" ' + (locked ? 'disabled' : '') + ' />';

        // Locked games show a note (final score, or "kicked off") that expands
        // to reveal everyone's picks (+ points once the game has a score). For a
        // knockout result, append how it was decided (penalties / extra time).
        let note = finished ? t('finalLocked')(hs, as) : t('startedLocked');
        if (finished) { const rn = resultNoteText(m); if (rn) note += ' — ' + rn; }
        const lockBlock = locked
          ? '<details class="reveal" ontoggle="revealPicks(this, \'' + escapeHtml(m.id) + '\')">' +
            '<summary>' + escapeHtml(note) + ' <span class="reveal-hint">' + escapeHtml(t('showPicks')) +
            '</span></summary><div class="reveal-body"></div></details>'
          : '';

        // Knockout games: when the pick is a draw, ask who wins on penalties.
        // Hidden until the two scores are equal (toggled in updatePenRow).
        const penRow = (!locked && isKnockout(m))
          ? '<div class="penrow" data-id="' + escapeHtml(m.id) + '" style="display:none">' +
              '<span class="penlabel">' + escapeHtml(t('penaltyWinner')) + '</span>' +
              '<button type="button" class="penbtn" data-id="' + escapeHtml(m.id) + '" data-side="home">' + escapeHtml(teamAbbr(m.home)) + '</button>' +
              '<button type="button" class="penbtn" data-id="' + escapeHtml(m.id) + '" data-side="away">' + escapeHtml(teamAbbr(m.away)) + '</button>' +
            '</div>'
          : '';

        card.innerHTML =
          (metaBits.length ? '<div class="meta-row">' + metaBits.join('<span>·</span>') + '</div>' : '') +
          teamCell(m.home, 'home') +
          '<div class="pick">' + prob('home') + input('home') + '</div>' +
          '<div class="pick vs-cell">' + prob('draw') + '<div class="vs">' + escapeHtml(t('vs')) + '</div></div>' +
          '<div class="pick">' + prob('away') + input('away') + '</div>' +
          teamCell(m.away, 'away') +
          penRow + lockBlock;
        wrap.appendChild(card);
      });
    });

    applyDrafts(drafts);
    fillEmptyFromSaved();   // backfill saved picks for games that weren't in the snapshot (e.g. just-unhidden)
    document.querySelectorAll('#matches .penrow').forEach(r => updatePenRow(r.dataset.id));
  }

  // Fill any still-empty input from the current player's saved picks — used
  // after render so unhiding a locked game restores its (saved, disabled) pick.
  function fillEmptyFromSaved() {
    if (!AUTH) return;
    SHEET.guesses.filter(g => g.player === AUTH.name).forEach(g => {
      let filled = false;
      ['home', 'away'].forEach(side => {
        const inp = document.querySelector('#matches input[data-id="' + g.matchId + '"][data-side="' + side + '"]');
        if (inp && inp.value === '') { inp.value = g[side]; filled = true; }
      });
      // Restore the saved penalty pick only if a draft didn't already set one.
      if (filled && !document.querySelector('#matches .penbtn[data-id="' + g.matchId + '"].active')) {
        setPenaltyPick(g.matchId, g.penaltyWinner);
      }
    });
  }

  // Fill a locked game's <details> with everyone's picks when it's expanded
  // (rebuilt on each open so it reflects the current cache).
  function revealPicks(el, mid) {
    if (!el.open) return;
    const m = MATCHES.find(x => x.id === mid);
    if (m) el.querySelector('.reveal-body').innerHTML = buildPicksList(m);
  }

  // A guess in the roomy by-game picks lists (Results "by game" + pick tab): show
  // the chosen penalty winner as a labelled badge, since there's space for it.
  function formatGuessCell(g, m) {
    if (!g) return '—';
    let s = g.home + '–' + g.away;
    if (isKnockout(m) && g.home === g.away && g.penaltyWinner) {
      const side = g.penaltyWinner === 'home' ? m.home : m.away;
      s += ' <span class="pen-tag" title="' + escapeHtml(t('penaltyWinner')) + '">⚽ ' +
        escapeHtml(teamAbbr(side)) + '</span>';
    }
    return s;
  }

  // A guess in the cramped Results matrix cell: mark the chosen penalty winner on
  // the score digit (bold + underline + accent), matching how the actual result
  // is shown there — no room for the badge.
  function formatGuessCompact(g, m) {
    if (!g) return '—';
    if (isKnockout(m) && g.home === g.away && g.penaltyWinner) {
      return scoreWithBold(g.home, g.away, g.penaltyWinner);
    }
    return g.home + '–' + g.away;
  }

  // Table of every player's guess for match m. Points are shown once final, and
  // provisionally (accent-tinted) for a live game whose live score we've fetched.
  function buildPicksList(m) {
    const live = !isFinished(m) ? liveScoreOf(m) : null;     // {home,away} if live data is in
    const scoreM = live ? liveAsFinal(m, live.home, live.away) : m;
    const showPts = isFinished(m) || !!live;                 // a points column when final OR live-scored
    const players = [...new Set([...SHEET.players, ...SHEET.guesses.map(g => g.player)])];
    const lut = {};
    SHEET.guesses.forEach(g => { (lut[g.player] = lut[g.player] || {})[g.matchId] = g; });

    const rows = players.map(p => {
      const g = (lut[p] || {})[m.id];
      return { player: p, guess: g, pts: (g && showPts) ? scorePick(g, scoreM) : null };
    }).sort((a, b) => showPts
      ? (b.pts == null ? -1 : b.pts) - (a.pts == null ? -1 : a.pts) || a.player.localeCompare(b.player)
      : (b.guess ? 1 : 0) - (a.guess ? 1 : 0) || a.player.localeCompare(b.player));

    const head = '<tr><th>' + escapeHtml(t('thPlayer')) + '</th><th>' + escapeHtml(t('thGuess')) + '</th>' +
      (showPts ? '<th class="num">' + escapeHtml(t('thPts')) + '</th>' : '') + '</tr>';
    const body = rows.map(r =>
      '<tr><td>' + escapeHtml(r.player) + '</td>' +
      '<td class="guess">' + formatGuessCell(r.guess, m) + '</td>' +
      (showPts ? '<td class="num ' + ptsClass(r.pts) + (live ? ' live-pts' : '') + '">' +
        (r.pts == null ? '—' : r.pts) + '</td>' : '') +
      '</tr>'
    ).join('');
    return '<table class="reveal-table">' + head + body + '</table>';
  }

  async function submitGuesses() {
    if (!AUTH) { msg(t('loginFirst'), 'err'); showTab('who'); return; }
    const player = AUTH.name;

    const byId = {};
    MATCHES.forEach(m => { byId[m.id] = m; });

    const guesses = [];
    document.querySelectorAll('#matches input[data-side="home"]').forEach(hIn => {
      const id = hIn.dataset.id;
      if (byId[id] && isLocked(byId[id])) return;   // never submit a scored / kicked-off game
      const aIn = document.querySelector('#matches input[data-id="' + id + '"][data-side="away"]');
      if (hIn.value !== '' && aIn.value !== '') {
        const home = parseInt(hIn.value, 10), away = parseInt(aIn.value, 10);
        const guess = { matchId: id, home: home, away: away };
        // Knockout draw → include the chosen penalty winner.
        if (byId[id] && isKnockout(byId[id]) && home === away) {
          const sel = document.querySelector('#matches .penbtn[data-id="' + id + '"].active');
          guess.penaltyWinner = sel ? sel.dataset.side : '';
        }
        guesses.push(guess);
      }
    });
    if (!guesses.length) { msg(t('enterScore'), 'err'); return; }
    // Require a penalty winner for any knockout-draw pick.
    if (guesses.some(g => byId[g.matchId] && isKnockout(byId[g.matchId]) && g.home === g.away && !g.penaltyWinner)) {
      msg(t('pickPenaltyWinner'), 'err'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; msg(t('saving'), 'ok');
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ token: AUTH.token, guesses: guesses }) // text/plain → no CORS preflight
      });
      const data = await res.json();
      if (data.ok) {
        updateCacheGuesses(player, guesses);
        const extra = data.linked ? ' ' + t('alsoSavedForN')(data.linked) : '';
        msg(t('saved')(data.saved) + extra, 'ok');
        if (ONLY_NOPICK) renderMatches();
      }
      else if (data.error === 'bad_password' || data.error === 'unauthorized') { logout(); addMsg(t('loginFirst'), 'err'); }
      else if (data.error === 'not_joined') msg(t('submitErrNotJoined'), 'err');
      else msg(t('errorPrefix')(data.error || t('unknown')), 'err');
    } catch (e) {
      msg(t('networkError'), 'err');
    }
    btn.disabled = false;
  }

  // ---- "Fav by 1" synthetic player (standings tab only) --------------------
  // A non-human benchmark that backs the favourite by one goal (1-0, or 2-1 when
  // the implied mean total clears a calibrated threshold). Its picks come from a
  // sidecar JSON (python/apply_model.py); it is merged into the standings data
  // locally so it never leaks into the other tabs / the sheet.
  function favName() { return t('favPlayerName'); }
  function favGuesses() {
    return (FAV_PICKS || []).map(p =>
      ({ player: favName(), matchId: p.matchId, home: p.home, away: p.away }));
  }
  async function loadFavPicks() {
    if (FAV_PICKS !== null) return;            // already attempted (loaded or failed)
    try {
      const res = await fetch(FAV_PICKS_URL, { cache: 'no-store' });
      const data = await res.json();
      FAV_PICKS = (data.games || [])
        .filter(g => g.pick_home != null && g.pick_away != null)
        .map(g => ({ matchId: String(g.event_id), home: g.pick_home, away: g.pick_away }));
    } catch (e) {
      FAV_PICKS = [];                          // no benchmark available → simply absent
    }
  }

  // ---- Standings: combine sheet picks + fixtures results in the browser ----
  function computeStandings(guesses, players) {
    const byId = {};
    MATCHES.forEach(m => { byId[m.id] = m; });
    const totals = {}, exact = {}, gd = {}, gdErr = {};
    const ensure = p => { if (totals[p] == null) { totals[p] = 0; exact[p] = 0; gd[p] = 0; gdErr[p] = 0; } };
    (players || []).forEach(ensure);

    let finished = 0;
    MATCHES.forEach(m => { if (isFinished(m)) finished++; });

    guesses.forEach(g => {
      const m = byId[g.matchId];
      if (!m) return;
      ensure(g.player);
      if (!isFinished(m)) return;   // only FINAL games are scored (skips pre-game + live)
      const aHome = homeScore(m), aAway = awayScore(m);
      if (aHome == null || aAway == null) return;
      totals[g.player] += scorePick(g, m);
      if (g.home === aHome && g.away === aAway) exact[g.player] += 1;
      // Correct goal difference — counted only for winner picks (a draw's GD is
      // trivially right, so it wouldn't discriminate). Includes exact winners.
      if (g.home !== g.away && (g.home - g.away) === (aHome - aAway)) gd[g.player] += 1;
      // Total absolute goal-difference error: how far the predicted margin was off.
      gdErr[g.player] += Math.abs((g.home - g.away) - (aHome - aAway));
    });

    const rows = Object.keys(totals).map(p =>
      ({ player: p, points: totals[p], exact: exact[p], gd: gd[p], gdErr: gdErr[p] }));
    rows.sort((a, b) =>
      b.points - a.points || b.exact - a.exact || b.gd - a.gd || a.player.localeCompare(b.player));
    let rank = 0, prev = null;
    rows.forEach((r, i) => { if (r.points !== prev) { rank = i + 1; prev = r.points; } r.rank = rank; });
    return { rows, finished };
  }

  async function loadStandings() {
    const body = document.getElementById('standingsBody');
    if (pointsChart) { pointsChart.destroy(); pointsChart = null; }
    document.getElementById('pointsChart').innerHTML = '';   // cleared unless we render below
    if (SCRIPT_URL.startsWith('PASTE')) {
      body.innerHTML = '<tr><td colspan="6" style="color:var(--bad)">' + escapeHtml(t('setScriptUrlFirst')) + '</td></tr>';
      return;
    }
    if (!AUTH) {
      document.getElementById('standingsMeta').textContent = '';
      body.innerHTML = '<tr><td colspan="6" class="loading">' + escapeHtml(t('loginRequired')) + '</td></tr>';
      return;
    }
    body.innerHTML = '<tr><td colspan="6" class="loading">' + escapeHtml(t('loading')) + '</td></tr>';
    try {
      await loadPlayers(); await loadGuesses(); await loadFavPicks();
      // Merge the synthetic "Fav by 1" benchmark in locally (standings tab only).
      const hasFav = !!(FAV_PICKS && FAV_PICKS.length);
      const allGuesses = SHEET.guesses.concat(favGuesses());
      const allPlayers = hasFav ? SHEET.players.concat([favName()]) : SHEET.players;
      const { rows, finished } = computeStandings(allGuesses, allPlayers);
      document.getElementById('standingsMeta').textContent = t('matchesScored')(finished);
      if (!rows.length) { body.innerHTML = '<tr><td colspan="6" class="loading">' + escapeHtml(t('noPlayers')) + '</td></tr>'; return; }

      // Provisional live overlay: add each in-progress game's points to a "live
      // standing", re-ranked by the combined total. Settled + Δ shown per cell.
      const { delta, hasPick } = computeLiveDeltas(allGuesses);
      rows.forEach(r => {
        const d = delta[r.player] || { points: 0, exact: 0, gd: 0, gdErr: 0 };
        r.live = !!hasPick[r.player];
        r.dPoints = d.points; r.dExact = d.exact; r.dGd = d.gd; r.dGdErr = d.gdErr;
        r.tPoints = r.points + d.points; r.tExact = r.exact + d.exact; r.tGd = r.gd + d.gd;
      });
      rows.sort((a, b) => b.tPoints - a.tPoints || b.tExact - a.tExact || b.tGd - a.tGd || a.player.localeCompare(b.player));
      let rk = 0, pv = null;
      rows.forEach((r, i) => { if (r.tPoints !== pv) { rk = i + 1; pv = r.tPoints; } r.rank = rk; });

      // base count, plus a green "+Δ" for players with a stake in a live game.
      const cell = (base, d, live) => base + (live ? ' <span class="live-delta">+' + d + '</span>' : '');
      body.innerHTML = '';
      rows.forEach(r => {
        const tr = document.createElement('tr');
        if (r.rank === 1) tr.className = 'rank1';
        if (CHART_SELECTED.has(r.player)) tr.classList.add('sel');
        if (hasFav && r.player === favName()) tr.classList.add('fav-row');  // not a real player
        tr.dataset.player = r.player;
        tr.innerHTML = '<td>' + r.rank + '</td><td>' + escapeHtml(r.player) +
          '</td><td class="num">' + cell(r.points, r.dPoints, r.live) +
          '</td><td class="num">' + cell(r.exact, r.dExact, r.live) +
          '</td><td class="num">' + cell(r.gd, r.dGd, r.live) +
          '</td><td class="num">' + cell(r.gdErr, r.dGdErr, r.live) + '</td>';
        tr.addEventListener('mouseenter', () => applyChartHighlight(r.player));
        tr.addEventListener('mouseleave', () => applyChartHighlight());
        // Click expands this player's picks below. Persistent chart pinning is the
        // legend's job (a row click no longer pins, to keep the two independent).
        tr.addEventListener('click', () => togglePlayerGuesses(tr, r.player));
        body.appendChild(tr);
      });
      renderPointsChart(allPlayers, allGuesses);
    } catch (e) {
      body.innerHTML = '<tr><td colspan="6" style="color:var(--bad)">' + escapeHtml(t('couldNotLoadStandings')) + '</td></tr>';
    }
  }

  // Expand/collapse a player's picks directly under their standings row. Shows
  // every pick we have for them — for yourself that's all games (incl. upcoming);
  // for others only locked games (the server never sends their unplayed picks).
  // Finished games show points; live games show provisional points (accent).
  function togglePlayerGuesses(tr, player) {
    const next = tr.nextElementSibling;
    const open = next && next.classList.contains('standings-expand') && next.dataset.expandFor === player;
    document.querySelectorAll('#standingsBody .standings-expand').forEach(e => e.remove());
    if (open) return;   // it was open → leave it collapsed
    const exp = document.createElement('tr');
    exp.className = 'standings-expand';
    exp.dataset.expandFor = player;
    exp.innerHTML = '<td colspan="6">' + playerGuessList(player) + '</td>';
    tr.after(exp);
  }

  // One player's picks, grouped by group / knockout stage (same ordering as the
  // schedule). Each game shows the result, the pick, and points once scored.
  function playerGuessList(player) {
    const isFav = player === favName();
    const lut = {};
    (isFav ? favGuesses() : SHEET.guesses).forEach(g => { if (g.player === player) lut[g.matchId] = g; });
    let games = MATCHES.filter(m => lut[m.id]);
    // The benchmark's upcoming picks are hidden — only show completed + live games.
    if (isFav) games = games.filter(m => isFinished(m) || liveScoreOf(m));
    games = games.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    if (!games.length) return '<div class="pg-none">' + escapeHtml(t('noPicksYet')) + '</div>';

    const flag = side => {
      const l = teamLogo(side);
      return l ? '<img class="flag" src="' + escapeHtml(l) + '" alt="" loading="lazy" />' : '';
    };
    const rowFor = m => {
      const g = lut[m.id];
      const live = !isFinished(m) ? liveScoreOf(m) : null;
      const scored = isFinished(m) || !!live;
      const pts = scored ? scorePick(g, live ? liveAsFinal(m, live.home, live.away) : m) : null;
      var result;
      if (isFinished(m)) {
        result = '<span class="score"' + (shootoutResult(m) ? ' title="' + escapeHtml(t('penaltyWinner')) + '"' : '') +
          '>' + finalScoreHtml(m, homeScore(m), awayScore(m)) + '</span>';
      } else if (live) {
        result = '<span class="score score-live">' + live.home + '–' + live.away + ' ' + escapeHtml(t('liveLabel')) + '</span>';
      } else {
        result = '<span class="pg-vs">' + escapeHtml(t('vs')) + '</span>';
      }
      const ptsCell = scored
        ? '<td class="num ' + ptsClass(pts) + (live ? ' live-pts' : '') + '">' + pts + '</td>'
        : '<td class="num pg-upcoming">—</td>';
      return '<tr><td class="pg-game">' + flag(m.home) + escapeHtml(teamAbbr(m.home)) + ' ' + result + ' ' +
        escapeHtml(teamAbbr(m.away)) + flag(m.away) + '</td>' +
        '<td class="guess">' + formatGuessCell(g, m) + '</td>' + ptsCell + '</tr>';
    };

    const head = '<tr><th>' + escapeHtml(t('thGame')) + '</th><th>' + escapeHtml(t('thGuess')) +
      '</th><th class="num">' + escapeHtml(t('thPts')) + '</th></tr>';
    const body = sectionize(games).map(sec =>
      '<tr class="pg-section"><th colspan="3">' + escapeHtml(sec.title) + '</th></tr>' +
      sec.matches.map(rowFor).join('')).join('');
    return '<table class="reveal-table pg-table">' + head + body + '</table>';
  }

  let pointsChart = null;          // Chart.js instance for the cumulative-points line chart
  let CHART_SELECTED = new Set();  // pinned players (click to toggle); empty = all lines equal

  function cssVar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
  const chartColor = (hue, alpha) => 'hsla(' + hue + ',70%,60%,' + (alpha == null ? 1 : alpha) + ')';

  // Singleton HTML element for the chart's custom (logo-capable) tooltip.
  function chartTooltipEl() {
    let el = document.getElementById('chartTooltip');
    if (!el) { el = document.createElement('div'); el.id = 'chartTooltip'; el.className = 'chart-tooltip'; document.body.appendChild(el); }
    return el;
  }

  // Chart.js line chart of each player's cumulative points across completed
  // games (chronological). Hovering a standings row or legend item highlights
  // the matching line (others dimmed).
  function renderPointsChart(cfgPlayers, guesses) {
    const el = document.getElementById('pointsChart');
    if (pointsChart) { pointsChart.destroy(); pointsChart = null; }
    const completed = MATCHES.filter(isFinished)
      .slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    const N = completed.length;
    if (!N || typeof Chart === 'undefined') { el.innerHTML = ''; return; }

    const players = [...new Set([...cfgPlayers, ...guesses.map(g => g.player)])];
    const lut = {};
    guesses.forEach(g => { (lut[g.player] = lut[g.player] || {})[g.matchId] = g; });

    const series = {};   // player -> cumulative points after game 0..N (index 0 = start)
    players.forEach(p => {
      let run = 0; const arr = [0];
      completed.forEach(m => {
        const g = (lut[p] || {})[m.id];
        if (g) run += scorePick(g, m);
        arr.push(run);
      });
      series[p] = arr;
    });
    // Each player's colour is fixed by their position in the Players sheet (with
    // any guess-only names appended alphabetically), so it stays the same no
    // matter how the current standings shuffle. Guard against an empty divisor.
    const extras = [...new Set(guesses.map(g => g.player))].filter(p => !cfgPlayers.includes(p)).sort();
    const paletteOrder = [...cfgPlayers, ...extras];
    const hueOf = {};
    paletteOrder.forEach((p, i) => { hueOf[p] = Math.round(i * 360 / (paletteOrder.length || 1)); });

    players.sort((a, b) => series[b][N] - series[a][N] || a.localeCompare(b));   // leader first (draw/legend order only)

    const labels = [];
    for (let i = 0; i <= N; i++) labels.push(i === 0 ? '' : String(i));
    const datasets = players.map(p => {
      const hue = hueOf[p];
      return { label: p, data: series[p], _hue: hue,
        borderColor: chartColor(hue), backgroundColor: chartColor(hue),
        borderDash: p === favName() ? [6, 4] : [],   // dashed line marks the benchmark
        borderWidth: 2, pointRadius: 0, pointHoverRadius: 4, tension: 0.15 };
    });

    el.innerHTML = '<div class="card"><h2 class="chart-title">' + escapeHtml(t('pointsChartTitle')) + '</h2>' +
      '<div class="chart-wrap"><canvas id="pointsCanvas"></canvas></div><div class="legend" id="chartLegend"></div></div>';

    const grid = cssVar('--line'), tick = cssVar('--muted');
    pointsChart = new Chart(document.getElementById('pointsCanvas'), {
      type: 'line',
      data: { labels: labels, datasets: datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false }   // replaced by our custom mousemove tooltip below
        },
        scales: {
          x: { grid: { color: grid }, ticks: { color: tick, autoSkip: true, maxRotation: 0 } },
          y: { beginAtZero: true, grid: { color: grid }, ticks: { color: tick, precision: 0 } }
        }
      }
    });

    const legend = document.getElementById('chartLegend');
    legend.innerHTML = players.map(p =>
      '<span class="leg' + (CHART_SELECTED.has(p) ? ' sel' : '') + '" data-player="' + escapeHtml(p) +
      '"><span class="sw" style="background:' + chartColor(hueOf[p]) + '"></span>' +
      escapeHtml(p) + '</span>').join('');
    legend.querySelectorAll('.leg').forEach(elem => {
      elem.addEventListener('mouseenter', () => applyChartHighlight(elem.dataset.player));
      elem.addEventListener('mouseleave', () => applyChartHighlight());
      elem.addEventListener('click', () => toggleChartSelect(elem.dataset.player));
    });
    applyChartHighlight();   // reflect any persisted pins on the fresh chart

    // Custom tooltip: over a line → that player's points for the nearest game;
    // over the x-axis labels → EVERY player's points for that game.
    const canvas = pointsChart.canvas;
    const lg = side => { const l = teamLogo(side); return l ? '<img src="' + escapeHtml(l) + '" alt="" />' : ''; };
    canvas.addEventListener('mousemove', e => {
      const chart = pointsChart, area = chart.chartArea, rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const tip = chartTooltipEl();
      if (mx < area.left || mx > area.right || my < area.top || my > chart.height) { tip.style.opacity = 0; return; }
      let idx = Math.round(chart.scales.x.getValueForPixel(mx));
      idx = Math.max(0, Math.min(N, idx));
      const inAxis = my > area.bottom;   // below the plot area = over the x-axis labels
      let list = chart.data.datasets.map(ds => ({ ds, val: ds.data[idx], gained: idx === 0 ? 0 : ds.data[idx] - ds.data[idx - 1] }));
      let anchorY;
      if (inAxis) {
        list.sort((a, b) => b.gained - a.gained || a.ds.label.localeCompare(b.ds.label));
        anchorY = area.bottom;
      } else {
        let best = list[0], bestD = Infinity;
        list.forEach(o => { const d = Math.abs(chart.scales.y.getPixelForValue(o.val) - my); if (d < bestD) { bestD = d; best = o; } });
        // include EVERY line passing through the same point (tied/intersecting lines)
        list = list.filter(o => o.val === best.val).sort((a, b) => b.gained - a.gained || a.ds.label.localeCompare(b.ds.label));
        anchorY = chart.scales.y.getPixelForValue(best.val);
      }
      let title = escapeHtml(t('start'));
      if (idx > 0) {
        const m = completed[idx - 1];
        title = m ? lg(m.home) + escapeHtml(teamAbbr(m.home)) + ' <b>' + homeScore(m) + '–' + awayScore(m) +
          '</b> ' + escapeHtml(teamAbbr(m.away)) + lg(m.away) : '';
      }
      tip.innerHTML = '<div class="tt-title">' + title + '</div>' + list.map(o =>
        '<div class="tt-row"><span class="sw" style="background:' + chartColor(o.ds._hue) + '"></span>' +
        escapeHtml(o.ds.label) + ': ' + o.gained + '</div>').join('');
      tip.style.opacity = 1;
      tip.style.left = (window.scrollX + rect.left + chart.scales.x.getPixelForValue(idx)) + 'px';
      tip.style.top = (window.scrollY + rect.top + anchorY) + 'px';
    });
    canvas.addEventListener('mouseleave', () => { chartTooltipEl().style.opacity = 0; });
  }

  // Click to pin/unpin a line; supports multiple. Empty set → all lines equal.
  function toggleChartSelect(name) {
    if (CHART_SELECTED.has(name)) CHART_SELECTED.delete(name); else CHART_SELECTED.add(name);
    const on = CHART_SELECTED.has(name);
    document.querySelectorAll('#standingsBody tr, #chartLegend .leg').forEach(el => {
      if (el.dataset.player === name) el.classList.toggle('sel', on);
    });
    applyChartHighlight(name);
  }

  // Emphasise lines from the pinned set, plus an optional transient hover.
  function applyChartHighlight(hoverName) {
    if (!pointsChart) return;
    const anySel = CHART_SELECTED.size > 0;
    const focus = anySel || !!hoverName;
    const isLit = p => hoverName ? (p === hoverName || (anySel && CHART_SELECTED.has(p)))
                                 : (anySel ? CHART_SELECTED.has(p) : true);
    pointsChart.data.datasets.forEach(ds => {
      const lit = isLit(ds.label);
      ds.borderColor = chartColor(ds._hue, (focus && !lit) ? 0.15 : 1);
      ds.borderWidth = (focus && lit) ? 3.5 : 2;
    });
    pointsChart.update('none');
    document.querySelectorAll('#chartLegend .leg').forEach(el =>
      el.classList.toggle('dim', focus && !isLit(el.dataset.player)));
  }

  // ---- Schedule tab: completed games, grouped by day, with every guess ------
  function markScheduleViewButtons() {
    document.getElementById('svTable').classList.toggle('active', SCHEDULE_VIEW === 'table');
    document.getElementById('svGame').classList.toggle('active', SCHEDULE_VIEW === 'game');
  }

  function setScheduleView(mode) {
    if (mode === SCHEDULE_VIEW) return;
    SCHEDULE_VIEW = mode;
    SCHEDULE_FILTER = null;   // a manual layout switch shows the full schedule
    markScheduleViewButtons();
    loadSchedule();           // re-render from cache
  }

  // Results tab: "today" = kicked off within the last 24 hours.
  const TODAY_WINDOW_MS = 24 * 60 * 60 * 1000;
  function kickedOffToday(m) {
    const t = Date.parse(m.date);
    return !isNaN(t) && (Date.now() - t) <= TODAY_WINDOW_MS;
  }
  function setScheduleTodayOnly(on) {
    SCHEDULE_TODAY_ONLY = on;
    loadSchedule();           // re-render from cache
  }

  // From the Groups tab: jump to the schedule by-game view filtered to a game / team.
  function showGameInSchedule(id) {
    SCHEDULE_FILTER = { type: 'match', id: id };
    SCHEDULE_VIEW = 'game';
    markScheduleViewButtons();
    showTab('schedule');
  }
  function showTeamInSchedule(abbr) {
    SCHEDULE_FILTER = { type: 'team', abbr: abbr };
    SCHEDULE_VIEW = 'game';
    markScheduleViewButtons();
    showTab('schedule');
  }
  function clearScheduleFilter() { SCHEDULE_FILTER = null; loadSchedule(); }

  function scheduleFilterLabel() {
    if (!SCHEDULE_FILTER) return '';
    if (SCHEDULE_FILTER.type === 'match') {
      const m = MATCHES.find(x => x.id === SCHEDULE_FILTER.id);
      return m ? teamAbbr(m.home) + '–' + teamAbbr(m.away) : '';
    }
    const m = MATCHES.find(x => teamAbbr(x.home) === SCHEDULE_FILTER.abbr || teamAbbr(x.away) === SCHEDULE_FILTER.abbr);
    if (m) return teamName(teamAbbr(m.home) === SCHEDULE_FILTER.abbr ? m.home : m.away);
    return SCHEDULE_FILTER.abbr;
  }

  async function loadSchedule() {
    const body = document.getElementById('scheduleBody');
    document.getElementById('scheduleMeta').textContent = '';
    if (SCRIPT_URL.startsWith('PASTE')) {
      body.innerHTML = '<div class="card" style="color:var(--bad)">' + escapeHtml(t('setScriptUrlFirst')) + '</div>';
      return;
    }
    if (!AUTH) {
      body.innerHTML = '<div class="card">' + escapeHtml(t('loginRequired')) + '</div>';
      return;
    }
    body.innerHTML = '<div class="loading">' + escapeHtml(t('loading')) + '</div>';
    try {
      await loadPlayers(); await loadGuesses();
      renderSchedule(SHEET.players, SHEET.guesses);
    } catch (e) {
      body.innerHTML = '<div class="card" style="color:var(--bad)">' + escapeHtml(t('couldNotLoadSchedule')) + '</div>';
    }
  }

  // Colour by points magnitude (knockouts can reach 4): 0 muted · 1 yellow ·
  // 2 cyan · 3+ green.
  function ptsClass(pts) {
    if (pts == null) return 'pts-none';
    if (pts <= 0) return 'pts-zero';
    if (pts >= 3) return 'pts-exact';
    if (pts === 2) return 'pts-gd';
    return 'pts-outcome';
  }

  // Render the schedule in the chosen layout (table matrix or by-game cards).
  function renderSchedule(cfgPlayers, guesses) {
    const body = document.getElementById('scheduleBody');
    // Show every kicked-off game: final results AND in-progress (live) ones,
    // optionally narrowed to games that kicked off in the last 24 hours.
    let played = MATCHES.filter(m => isFinished(m) || isLive(m));
    if (SCHEDULE_TODAY_ONLY) played = played.filter(kickedOffToday);
    const liveN = MATCHES.filter(isLive).length;
    let meta = t('completedGames')(MATCHES.filter(isFinished).length);
    if (liveN) meta += t('inProgress')(liveN);
    document.getElementById('scheduleMeta').textContent = meta;
    if (!played.length) {
      body.innerHTML = '<div class="card">' + escapeHtml(t('noCompleted')) + '</div>';
      return;
    }
    body.innerHTML = SCHEDULE_VIEW === 'game'
      ? scheduleByGame(played)
      : scheduleTable(played, cfgPlayers, guesses);
  }

  // By-game layout: read-only cards (like the pick tab) showing each final
  // result, grouped by the current group/chronological view. Tap to see picks.
  function scheduleByGame(completed) {
    let games = completed;
    let chip = '';
    if (SCHEDULE_FILTER) {
      if (SCHEDULE_FILTER.type === 'match') {
        games = completed.filter(m => m.id === SCHEDULE_FILTER.id);
      } else {
        games = completed.filter(m => teamAbbr(m.home) === SCHEDULE_FILTER.abbr || teamAbbr(m.away) === SCHEDULE_FILTER.abbr);
      }
      chip = '<div class="filter-bar"><span class="vt-label">' + escapeHtml(t('filtered')) + ':</span>' +
        '<button class="chip on" onclick="clearScheduleFilter()" title="' + escapeHtml(t('clearFilter')) + '">' +
        escapeHtml(scheduleFilterLabel()) + ' ✕</button></div>';
    }
    if (!games.length) return chip + '<div class="card">' + escapeHtml(t('noCompleted')) + '</div>';

    const sections = VIEW_MODE === 'date' ? sectionizeByDate(games) : sectionize(games);
    return chip + sections.map(section => {
      const head = '<div class="section-head"><h2>' + escapeHtml(section.title) + '</h2>' +
        '<span class="count">' + escapeHtml(t('matchCount')(section.matches.length)) + '</span></div>';
      const cards = section.matches.map(m => {
        const hs = homeScore(m), as = awayScore(m);
        const metaBits = [];
        if (m.date) metaBits.push(escapeHtml(kickoffLabel(m.date)));
        if (m.venue && m.venue.fullName) {
          metaBits.push(escapeHtml([m.venue.fullName, m.venue.city, m.venue.country].filter(Boolean).join(', ')));
        }
        // Final → score; live → the fetched live score (if any) + a LIVE badge,
        // else just the LIVE badge when no live data has been pulled yet.
        const ls = isFinished(m) ? null : liveScoreOf(m);
        const liveBadge = '<span class="live-badge">' + escapeHtml(t('liveLabel')) + '</span>';
        const scoreBlock = isFinished(m)
          ? '<div class="pick"><span class="rscore">' + hs + '</span></div>' +
            '<div class="pick vs-cell"><div class="vs">–</div></div>' +
            '<div class="pick"><span class="rscore">' + as + '</span></div>'
          : '<div class="pick"><span class="rscore">' + (ls ? ls.home : '') + '</span></div>' +
            '<div class="pick vs-cell">' + liveBadge + '</div>' +
            '<div class="pick"><span class="rscore">' + (ls ? ls.away : '') + '</span></div>';
        return '<div class="card match">' +
          (metaBits.length ? '<div class="meta-row">' + metaBits.join('<span>·</span>') + '</div>' : '') +
          teamCell(m.home, 'home') +
          scoreBlock +
          teamCell(m.away, 'away') +
          resultNote(m) +
          '<details class="reveal"' + (SCHEDULE_FILTER ? ' open' : '') + ' ontoggle="revealPicks(this, \'' + escapeHtml(m.id) + '\')">' +
            '<summary>' + escapeHtml(t('showPicks')) + '</summary>' +
            '<div class="reveal-body">' + (SCHEDULE_FILTER ? buildPicksList(m) : '') + '</div></details>' +
          '</div>';
      }).join('');
      return head + cards;
    }).join('');
  }

  // Table layout: matrix of completed games (rows) × players (columns).
  function scheduleTable(completed, cfgPlayers, guesses) {
    // Players = everyone joined + anyone with a guess. Build a guess lookup
    // (lut[player][matchId]) and each player's total over completed games, then
    // order the columns best-first (matches the standings order).
    const players = [...new Set([...cfgPlayers, ...guesses.map(g => g.player)])];
    const lut = {};
    guesses.forEach(g => { (lut[g.player] = lut[g.player] || {})[g.matchId] = g; });
    const total = {};
    players.forEach(p => { total[p] = 0; });
    // The match to score against: the game itself when final, or a synthetic
    // "as-if-final" from the live score when in progress (provisional). Null for
    // a pre-game or a live game we haven't fetched a score for.
    const scoreMatch = m => {
      if (isFinished(m)) return m;
      const ls = liveScoreOf(m);
      return ls ? liveAsFinal(m, ls.home, ls.away) : null;
    };

    completed.forEach(m => {
      const sm = scoreMatch(m);
      if (!sm) return;   // contributes nothing yet
      players.forEach(p => { const g = (lut[p] || {})[m.id]; if (g) total[p] += scorePick(g, sm); });
    });
    players.sort((a, b) => total[b] - total[a] || a.localeCompare(b));

    const cell = (p, m) => {
      const g = (lut[p] || {})[m.id];
      if (!g) return '<td><div class="pcell"><span class="g pts-none">—</span></div></td>';
      const sm = scoreMatch(m);
      if (!sm) return '<td><div class="pcell"><span class="g">' + formatGuessCompact(g, m) + '</span></div></td>';
      const pts = scorePick(g, sm);
      const liveCls = isFinished(m) ? '' : ' live-pts';   // accent-tint provisional points
      return '<td><div class="pcell"><span class="g">' + formatGuessCompact(g, m) +
        '</span><span class="p ' + ptsClass(pts) + liveCls + '">' + pts + '</span></div></td>';
    };

    // Team logo (browser caches by URL — same files the picks tab loads).
    const flag = side => {
      const l = teamLogo(side);
      return l ? '<img class="flag" src="' + escapeHtml(l) + '" alt="" loading="lazy" />' : '';
    };

    let html = '<div class="schedule-scroll"><table class="schedule-table"><thead><tr>' +
      '<th class="game">' + escapeHtml(t('thGame')) + '</th>' +
      players.map(p => '<th>' + escapeHtml(p) + '</th>').join('') +
      '</tr></thead><tbody>';

    // Top row: each player's running point total over the completed games.
    html += '<tr class="totals-row"><td class="game">' + escapeHtml(t('total')) + '</td>' +
      players.map(p => '<td><span class="tot">' + total[p] + '</span></td>').join('') + '</tr>';

    const sections = VIEW_MODE === 'date' ? sectionizeByDate(completed) : sectionize(completed);
    sections.forEach(section => {
      html += '<tr class="section-row"><th colspan="' + (players.length + 1) + '">' +
        escapeHtml(section.title) + '</th></tr>';
      section.matches.forEach(m => {
        const hs = homeScore(m), as = awayScore(m);
        // Final → score (penalty winner marked); live → fetched score + "LIVE", or just "LIVE".
        const ls = isFinished(m) ? null : liveScoreOf(m);
        const scoreCell = isFinished(m)
          ? '<span class="score"' + (shootoutResult(m) ? ' title="' + escapeHtml(t('penaltyWinner')) + '"' : '') +
            '>' + finalScoreHtml(m, hs, as) + '</span>'
          : '<span class="score score-live">' + (ls ? ls.home + '–' + ls.away + ' ' : '') + escapeHtml(t('liveLabel')) + '</span>';
        html += '<tr><td class="game">' +
          flag(m.home) + escapeHtml(teamAbbr(m.home)) + ' ' + scoreCell + ' ' +
          escapeHtml(teamAbbr(m.away)) + flag(m.away) + '</td>' +
          players.map(p => cell(p, m)).join('') +
          '</tr>';
      });
    });

    html += '</tbody></table></div>';
    return html;
  }

  // ---- Groups tab: live group tables from the fixtures ----------------------
  // Standings per group from completed group-stage games: 3 pts win / 1 draw,
  // sorted by points, then goal difference, then goals scored, then name.
  function renderGroups() {
    const body = document.getElementById('groupsBody');
    const groups = computeGroups(MATCHES);   // { letter: {teams, matches} }, computed in groups.js
    const letters = Object.keys(groups);
    if (!letters.length) {
      body.innerHTML = '<div class="card">' + escapeHtml(t('noGroups')) + '</div>';
      return;
    }

    body.innerHTML = letters.map(letter => {
      const teams = groups[letter].teams;

      const rows = teams.map(r => {
        const logo = teamLogo(r.side);
        const flag = logo ? '<img class="flag" src="' + escapeHtml(logo) + '" alt="" loading="lazy" />' : '';
        const goals = r.gf + '–' + r.ga + ' (' + (r.gd > 0 ? '+' : '') + r.gd + ')';
        return '<tr>' +
          '<td class="gteam" onclick="showTeamInSchedule(\'' + escapeHtml(teamAbbr(r.side)) + '\')">' +
            flag + '<span class="tn">' + escapeHtml(teamName(r.side)) +
            ' <span class="ab-paren">(' + escapeHtml(teamAbbr(r.side)) + ')</span></span></td>' +
          '<td class="num">' + r.played + '</td>' +
          '<td class="goalcol">' + goals + '</td>' +
          '<td class="num gpts">' + r.pts + '</td></tr>';
      }).join('');

      return '<div class="card">' +
        '<h2 class="group-title">' + escapeHtml(t('group') + ' ' + letter) + '</h2>' +
        '<table class="group-table"><thead><tr>' +
          '<th>' + escapeHtml(t('thTeam')) + '</th>' +
          '<th class="num">' + escapeHtml(t('thPlayed')) + '</th>' +
          '<th class="goalcol">' + escapeHtml(t('thGoals')) + '</th>' +
          '<th class="num">' + escapeHtml(t('thPts')) + '</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '<div class="h2h-label">' + escapeHtml(t('h2hTitle')) + '</div>' +
        '<div class="h2h-scroll">' + h2hMatrix(teams, groups[letter].matches) + '</div>' +
        '</div>';
    }).join('');
  }

  function flagAbbr(side) {
    const l = teamLogo(side);
    const img = l ? '<img class="flag" src="' + escapeHtml(l) + '" alt="" loading="lazy" />' : '';
    return img + '<span class="ab">' + escapeHtml(teamAbbr(side)) + '</span>';
  }

  // ---- Knockout tab: full bracket tree (built in bracket.js) ----------------

  // Short label for a bracket slot: a resolved team's abbreviation, or a compact
  // feeder reference ("R32·3") while the slot is still a placeholder.
  function koSlotLabel(side) {
    if (side && side.logo) return teamAbbr(side);            // resolved real team
    const dn = (side && side.displayName) || '';
    const m = dn.match(/^(Round of 32|Round of 16|Quarterfinal|Semifinal)s? (\d+) (Winner|Loser)$/);
    if (m) {
      const ab = { 'Round of 32': 'R32', 'Round of 16': 'R16', 'Quarterfinal': 'QF', 'Semifinal': 'SF' }[m[1]];
      return ab + '·' + m[2];
    }
    return (side && (side.abbreviation || side.shortDisplayName)) || 'TBD';
  }

  // One team's line in a bracket card: flag, label, score; winner highlighted.
  function koSideHtml(m, side) {
    const s = m[side];
    const win = m.winner === side;
    const logo = (s && s.logo)
      ? '<img class="flag" src="' + escapeHtml(s.logo) + '" alt="" loading="lazy" />'
      : '<span class="ko-noflag"></span>';
    // Final → real score; live → the fetched live score (if pulled); else nothing.
    const ls = isFinished(m) ? null : liveScoreOf(m);
    const sc = (isFinished(m) && s && s.score != null) ? '<span class="sc">' + s.score + '</span>'
      : ls ? '<span class="sc">' + ls[side] + '</span>' : '';
    return '<div class="ko-side' + (win ? ' win' : '') + '" title="' + escapeHtml(teamName(s)) + '">' +
      logo + '<span class="abbr">' + escapeHtml(koSlotLabel(s)) + '</span>' + sc + '</div>';
  }

  // Tiny footer tag: "LIVE" for in-progress games, else how a finished game was
  // decided (a.e.t. / penalties).
  function koTagHtml(m) {
    if (isLive(m)) return '<div class="ko-tag ko-live">' + escapeHtml(t('liveLabel')) + '</div>';
    if (!isFinished(m)) return '';
    const d = m.decidedBy || 'regulation';
    if (d === 'penalties') {
      const so = shootoutResult(m);
      const txt = (so && so.winSO != null && so.loseSO != null) ? t('penTag')(so.winSO, so.loseSO) : t('penTagPlain');
      return '<div class="ko-tag">' + escapeHtml(txt) + '</div>';
    }
    if (d === 'extra_time') return '<div class="ko-tag">' + escapeHtml(t('afterExtraTime')) + '</div>';
    return '';
  }

  function koMatchHtml(m, isFinal, isThird, attrs) {
    if (!m) return '';
    // Finished AND live games click through to the results tab, filtered to that game.
    const clickable = isFinished(m) || isLive(m);
    const cls = 'ko-match' + (isFinal ? ' ko-final' : '') + (isThird ? ' ko-third' : '') +
      (clickable ? ' ko-clickable' : '');
    const onclick = clickable ? ' onclick="showGameInSchedule(\'' + escapeHtml(m.id) + '\')"' : '';
    // Final and 3rd-place carry their round name inside the panel (no row label).
    const lbl = (isFinal || isThird) ? '<div class="ko-card-lbl">' + escapeHtml(stageLabel(m.stage)) + '</div>' : '';
    return '<div class="' + cls + '"' + (attrs || '') + onclick + '>' +
      lbl + koSideHtml(m, 'home') + koSideHtml(m, 'away') + koTagHtml(m) + '</div>';
  }

  function koRoundLabelHtml(stage) {
    return '<div class="ko-round-label">' + escapeHtml(stageLabel(stage)) + '</div>';
  }

  // A round as a row of cards (no label — only the final/3rd-place are labelled).
  // When `leaves` is given (the half's Round-of-32 count) and the round halves
  // cleanly, lay the cards on a leaf-unit grid so each card centres over the two
  // feeder matches below it; otherwise just centre them.
  function koRoundHtml(list, leaves) {
    const span = leaves / list.length;
    const onGrid = Number.isInteger(span);
    const cards = list.map((m, n) => {
      const attr = onGrid ? ' style="grid-column:' + (n * span + 1) + ' / span ' + span + '"' : '';
      return koMatchHtml(m, false, false, attr);
    }).join('');
    const open = onGrid
      ? '<div class="ko-round ko-grid" style="grid-template-columns:repeat(' + leaves + ',var(--ko-unit))">'
      : '<div class="ko-round">';
    return open + cards + '</div>';
  }

  function renderKnockout() {
    const body = document.getElementById('knockoutBody');
    const b = buildBracket(MATCHES);
    if (b.empty) { body.innerHTML = '<div class="card">' + escapeHtml(t('noKnockout')) + '</div>'; return; }

    let inner = '';
    if (!b.folded) {
      // Structure not as expected — fall back to a flat, labelled top-to-bottom list.
      ['round-of-32', 'round-of-16', 'quarterfinals', 'semifinals', '3rd-place-match', 'final']
        .forEach(slug => {
          const list = b.rounds[slug];
          if (list && list.length) inner += koRoundLabelHtml(list[0].stage) + koRoundHtml(list);
        });
    } else {
      // Both halves share one leaf-unit grid (Round-of-32 count) so every round
      // aligns: a match sits centred between its two feeders in the round below.
      const leaves = (b.topRows['round-of-32'] || []).length || (b.bottomRows['round-of-32'] || []).length;
      ['round-of-32', 'round-of-16', 'quarterfinals', 'semifinals']
        .forEach(slug => { if (b.topRows[slug].length) inner += koRoundHtml(b.topRows[slug], leaves); });
      // Centre row on the same leaf grid: the final spans the full width and
      // centres (directly under the semifinals); the 3rd-place sits to the right.
      const cols = ' style="grid-template-columns:repeat(' + leaves + ',var(--ko-unit))"';
      const finalAttr = ' style="grid-column:1 / span ' + leaves + ';grid-row:1"';
      const thirdAttr = ' style="grid-column:' + Math.max(1, leaves - 1) + ' / span 2;grid-row:1"';
      inner += '<div class="ko-round ko-grid ko-center"' + cols + '>' +
        koMatchHtml(b.final, true, false, finalAttr) +
        (b.third ? koMatchHtml(b.third, false, true, thirdAttr) : '') + '</div>';
      // Bottom half runs back outward: SF nearest the final, R32 at the very bottom.
      ['semifinals', 'quarterfinals', 'round-of-16', 'round-of-32']
        .forEach(slug => { if (b.bottomRows[slug].length) inner += koRoundHtml(b.bottomRows[slug], leaves); });
    }
    body.innerHTML = '<div class="ko-scroll"><div class="ko-tree">' + inner + '</div></div>';
  }

  // Head-to-head grid: rows × columns of the group's teams (same order as the
  // table). Each cell shows that pair's result from the ROW team's perspective.
  function h2hMatrix(teams, matches) {
    const findMatch = (a, b) => matches.find(x => {
      const h = teamAbbr(x.home), w = teamAbbr(x.away), ka = teamAbbr(a.side), kb = teamAbbr(b.side);
      return (h === ka && w === kb) || (h === kb && w === ka);
    });
    const cols = teams.map(c => '<th class="h2h-th">' + flagAbbr(c.side) + '</th>').join('');
    const rows = teams.map(rt => {
      const cells = teams.map(ct => {
        if (teamAbbr(rt.side) === teamAbbr(ct.side)) return '<td class="h2h-self"></td>';
        const m = findMatch(rt, ct);
        if (!m) return '<td></td>';
        if (isLive(m)) {
          const ls = liveScoreOf(m);
          const txt = ls
            ? (teamAbbr(m.home) === teamAbbr(rt.side) ? ls.home + ':' + ls.away : ls.away + ':' + ls.home)
            : t('liveLabel');
          return '<td class="h2h-cell h2h-live" onclick="showGameInSchedule(\'' + escapeHtml(m.id) + '\')">' +
            escapeHtml(txt) + '</td>';
        }
        if (!isFinished(m)) return '<td></td>';
        const hs = homeScore(m), as = awayScore(m);
        const score = teamAbbr(m.home) === teamAbbr(rt.side) ? hs + ':' + as : as + ':' + hs;
        return '<td class="h2h-cell" onclick="showGameInSchedule(\'' + escapeHtml(m.id) + '\')">' + score + '</td>';
      }).join('');
      return '<tr><th class="h2h-rowhead">' + flagAbbr(rt.side) + '</th>' + cells + '</tr>';
    }).join('');
    return '<table class="h2h-table"><thead><tr><th></th>' + cols + '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  init();
</script>
</body>
