<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup Prediction Pool</title>
<style>
  :root {
    --bg: #0f1729; --card: #1b2540; --line: #2c3a5e; --ink: #eef2ff;
    --muted: #9fb0d0; --accent: #3ddc97; --accent2: #ffd24a; --bad: #ff6b6b; --gold: #ffcf40;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
  }
  header { padding: 20px 0 8px; }
  /* Title left, language flags top-right — aligned to the main panel's width */
  .header-inner { max-width: 680px; margin: 0 auto; padding: 0 16px; display: flex;
    align-items: center; justify-content: space-between; gap: 12px; }
  .lang-toggle { flex: 0 0 auto; }
  h1 { margin: 0; font-size: 1.5rem; }
  .sub { color: var(--muted); font-size: .9rem; }
  main { max-width: 680px; margin: 0 auto; padding: 16px; }
  /* Classic underlined tabs: text on a baseline, active tab gets an accent underline */
  .tabs { display: flex; gap: 2px; margin: 12px 0 16px; border-bottom: 2px solid var(--line); }
  .tabs button {
    flex: 1; min-width: 0; padding: 10px 4px; border: 0; border-bottom: 2px solid transparent;
    margin-bottom: -2px; background: none; color: var(--muted); cursor: pointer; font-size: .85rem;
    border-radius: 0; outline: none;
  }
  .tabs button:hover { color: var(--ink); }
  .tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .viewtoggle { display: flex; align-items: center; gap: 8px; }
  .pickbar { display: flex; justify-content: space-between; align-items: center;
    gap: 8px 14px; flex-wrap: wrap; margin: 0 2px 12px; font-size: .85rem; color: var(--muted); }
  .clocktext { font-variant-numeric: tabular-nums; }
  .hidetoggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .hidetoggle input[type="checkbox"] { width: auto; padding: 0; margin: 0; cursor: pointer; }
  .pickfilters { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; }
  .morefilters-toggle { background: none; border: 0; color: var(--muted); cursor: pointer;
    font-size: .8rem; padding: 2px 2px; margin: 0 2px 8px; }
  .morefilters-toggle:hover { color: var(--ink); }
  .groupfilter { display: flex; flex-direction: column; gap: 8px; margin: 0 2px 12px; }
  .quickbtns { display: flex; flex-wrap: wrap; gap: 6px; }
  .quickbtn { padding: 4px 10px; border: 1px solid var(--line); background: var(--card);
    color: var(--ink); border-radius: 8px; cursor: pointer; font-size: .78rem; }
  .quickbtn:hover { border-color: var(--accent); }
  #groupChips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 10px; border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 999px; cursor: pointer; font-size: .78rem; }
  .chip.on { color: var(--ink); border-color: var(--accent); }
  .chip:not(.on) { opacity: .5; }
  .viewtoggle .vt-label { color: var(--muted); font-size: .85rem; }
  .viewtoggle button {
    padding: 6px 12px; border: 1px solid var(--line); background: var(--card);
    color: var(--ink); border-radius: 8px; cursor: pointer; font-size: .85rem;
  }
  .viewtoggle button.active { background: var(--accent); color: #06281b; font-weight: 600; border-color: var(--accent); }
  /* Language flags: compact, dimmed when inactive, accent ring when active */
  .viewtoggle button.lang-btn { padding: 3px; line-height: 0; background: var(--card); opacity: .45; }
  .viewtoggle button.lang-btn.active { opacity: 1; background: var(--card); border-color: var(--accent); }
  .viewtoggle button.lang-btn svg { display: block; border-radius: 2px; }
  /* Two right-aligned rows: badge+logout above, view toggle+reload below */
  .topbar { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin: 10px 2px 0; }
  .topbar-row { display: flex; align-items: center; gap: 10px 14px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { background: var(--card); border: 1px solid var(--accent); color: var(--ink);
    border-radius: 12px; padding: 6px 14px; font-size: .85rem; cursor: pointer; text-align: right; line-height: 1.35; }
  .badge b { color: var(--accent); }
  .badge .badge-league { color: var(--muted); font-weight: 400; }
  .badge .badge-link { font-size: .78rem; color: var(--muted); }
  .badge .badge-link .badge-league { color: var(--accent2); }
  .badge .badge-switch { cursor: pointer; }
  .badge .badge-switch:hover { color: var(--ink); text-decoration: underline; }
  .reload-btn {
    padding: 5px 11px; border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 8px; cursor: pointer; font-size: .78rem;
  }
  .reload-btn:hover { color: var(--ink); }
  .reload-btn:disabled { opacity: .5; cursor: default; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
  label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 6px; }
  select, input { width: 100%; padding: 10px; border-radius: 9px; border: 1px solid var(--line);
    background: #0d1426; color: var(--ink); font-size: 1rem; }
  .addlabel { font-size: .8rem; color: var(--muted); margin: 14px 0 4px; }
  .addrow { display: flex; flex-wrap: wrap; gap: 8px; margin: 0; }
  .addrow input { flex: 1 1 120px; }
  /* off-screen username field so password managers can save/fill the login */
  .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
  /* password field with an inline show/hide toggle */
  .pw-wrap { position: relative; display: flex; flex: 1 1 120px; }
  .pw-wrap input { flex: 1 1 auto; padding-right: 38px; }
  /* .pw-wrap prefix so these win over the bordered `.addrow button` rule */
  .pw-wrap .pw-toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: 0; outline: none; border-radius: 0; color: var(--muted);
    cursor: pointer; padding: 4px; display: flex; align-items: center; }
  .pw-wrap .pw-toggle:focus, .pw-wrap .pw-toggle:focus-visible { outline: none; }
  .pw-wrap .pw-toggle:hover { color: var(--ink); }
  .addrow button {
    flex: 0 0 auto; padding: 10px 16px; border: 1px solid var(--accent); background: transparent;
    color: var(--accent); border-radius: 9px; cursor: pointer; font-size: .95rem; font-weight: 600;
  }
  .addrow button:disabled { opacity: .5; cursor: default; }

  /* Section headings that group matches by stage / group letter */
  .section-head { display: flex; align-items: baseline; gap: 8px; margin: 22px 2px 8px; }
  .section-head h2 { margin: 0; font-size: 1.05rem; }
  .section-head .count { color: var(--muted); font-size: .8rem; }

  /* One match row. align-items:end keeps team names + inputs on a common
     baseline while the win-probability labels stack above the inputs. */
  .match { display: grid; grid-template-columns: 1fr 48px auto 48px 1fr; align-items: end; gap: 8px; }
  .match .team { display: flex; align-items: center; gap: 8px; min-width: 0; padding-bottom: 8px; }
  .match .team.home { justify-content: flex-start; }
  .match .team.away { justify-content: flex-end; }
  .match .team img.flag { width: 26px; height: 26px; object-fit: contain; flex: 0 0 auto; border-radius: 3px; background: #0d1426; }
  .match .team .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match .team .name .abbr { display: none; }
  /* Pick column = optional win-prob label stacked above the input / "vs". */
  .pick { display: flex; flex-direction: column; }
  .pick.vs-cell { align-items: center; }
  .prob { font-size: .72rem; font-weight: 600; color: var(--ink); text-align: center;
    margin-bottom: 4px; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .match .vs { text-align: center; color: var(--muted); padding-bottom: 8px; }
  .match input { text-align: center; padding: 8px; }
  .match .rscore { display: block; text-align: center; font-size: 1.2rem; font-weight: 700;
    color: var(--accent2); font-variant-numeric: tabular-nums; padding-bottom: 6px; }
  .meta-row { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: .75rem; color: var(--muted); margin-bottom: 4px; }
  .meta-row .odds { color: var(--accent2); }
  .meta-row .countdown { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
  .meta-row .countdown.soon { color: var(--accent2); }   /* within 48h → yellow/orange */
  .done { grid-column: 1 / -1; font-size: .78rem; color: var(--accent2); margin-top: 6px; font-weight: 600; }
  /* Full scoring rules panel (login tab) */
  .scoring-rules { margin-top: 14px; }
  .scoring-rules .rules-title { margin: 0 0 8px; font-size: 1.05rem; }
  .scoring-rules .rules-sub { margin: 12px 0 4px; font-weight: 700; color: var(--accent2); }
  .scoring-rules .rules-mode { margin: 10px 0 3px; font-size: .9rem; color: var(--muted); }
  .scoring-rules .rules-note { margin: 6px 0; font-size: .82rem; color: var(--muted); line-height: 1.4; }
  .scoring-rules .rules-list { margin: 0; padding-left: 20px; font-size: .9rem; line-height: 1.55; }
  .scoring-rules .rules-list b { color: var(--accent); font-variant-numeric: tabular-nums; }
  /* "France win 4:3 on penalties" caption under a knockout result in the game view */
  .pen-result { grid-column: 1 / -1; text-align: center; font-size: .82rem; color: var(--accent); font-weight: 600; margin-top: -6px; }
  /* Knockout penalty-winner picker (shown when the pick is a draw) */
  .penrow { grid-column: 1 / -1; display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; margin-top: 8px; }
  .penlabel { font-size: .8rem; color: var(--muted); }
  .penbtn { padding: 5px 12px; border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; cursor: pointer; font-size: .82rem; }
  .penbtn.active { background: var(--accent); color: #06281b; border-color: var(--accent); font-weight: 600; }
  /* Penalty-winner badge next to a knockout draw guess in the roomy by-game lists */
  .pen-tag { display: inline-flex; align-items: center; gap: 2px; margin-left: 4px; padding: 1px 6px;
    border: 1px solid var(--line); border-radius: 999px; font-size: .72rem; color: var(--muted); white-space: nowrap; }
  /* Locked-game reveal: tap the note to see everyone's picks */
  .reveal { grid-column: 1 / -1; margin-top: 6px; }
  .reveal summary { font-size: .78rem; color: var(--accent2); font-weight: 600; cursor: pointer; }
  .reveal .reveal-hint { color: var(--muted); font-weight: 400; }
  .reveal[open] summary { margin-bottom: 8px; }
  .reveal-table { width: 100%; }
  .reveal-table th { color: var(--muted); font-weight: 600; font-size: .72rem; text-align: left; padding: 3px 8px; }
  .reveal-table th.num { text-align: right; }
  .reveal-table td { padding: 4px 8px; border-bottom: 1px solid var(--line); font-size: .85rem; }
  .reveal-table td.guess { font-variant-numeric: tabular-nums; }
  .reveal-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  /* A player's picks expanded under their standings row */
  .standings-expand > td { padding: 6px 10px 10px; background: rgba(0,0,0,.12); }
  .pg-table .pg-game { white-space: nowrap; }
  .pg-table .pg-game img.flag { width: 16px; height: 16px; object-fit: contain; vertical-align: middle; margin: 0 4px; border-radius: 2px; }
  .pg-table .score { color: var(--accent2); font-weight: 700; padding: 0 3px; font-variant-numeric: tabular-nums; }
  .pg-table .score.score-live { color: var(--accent); }
  .pg-table .pg-vs { color: var(--muted); padding: 0 3px; }
  .pg-table .num.pg-upcoming { color: var(--line); }
  .pg-table .pg-section th { text-align: left; color: var(--ink); font-weight: 700;
    font-size: .78rem; padding-top: 12px; border-bottom: 1px solid var(--line); }
  .pg-none { color: var(--muted); font-size: .85rem; padding: 6px 2px; }

  /* On narrow screens swap full names for abbreviations to keep the row tidy */
  @media (max-width: 460px) {
    .match { grid-template-columns: 1fr 40px auto 40px 1fr; gap: 6px; }
    .match .team .name .full { display: none; }
    .match .team .name .abbr { display: inline; }
    .match .team img.flag { width: 22px; height: 22px; }
    /* Tabs wrap to two rows of three so labels don't overlap on narrow screens. */
    .tabs { flex-wrap: wrap; gap: 2px 6px; }
    .tabs button { flex: 1 1 28%; margin-bottom: 0; }
  }

  button.primary {
    width: 100%; padding: 13px; border: none; border-radius: 11px; background: var(--accent);
    color: #06281b; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 6px;
    position: sticky; bottom: 12px;
  }
  button.primary:disabled { opacity: .5; cursor: default; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 9px 8px; text-align: left; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: .8rem; text-transform: uppercase; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank1 td { color: var(--accent2); font-weight: 700; }
  /* Cumulative-points line chart (Standings tab) */
  .chart-title { margin: 0 0 10px; font-size: 1.05rem; }
  .chart-wrap { position: relative; height: 280px; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 12px; font-size: .82rem; color: var(--muted); }
  .leg { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: opacity .1s; }
  .leg.dim { opacity: .35; }
  .leg.sel { color: var(--ink); font-weight: 700; }
  .sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; flex: 0 0 auto; }
  #standingsBody tr { cursor: pointer; }
  #standingsBody tr:hover td { background: rgba(255,255,255,.04); }
  #standingsBody tr.sel td { background: rgba(61,220,151,.12); }
  /* Synthetic benchmark row — tinted + italic so it's obviously not a real player. */
  #standingsBody tr.fav-row td { background: rgba(150,120,230,.16); font-style: italic; }
  #standingsBody tr.fav-row:hover td { background: rgba(150,120,230,.24); }
  #standingsBody tr.fav-row td:nth-child(2) { border-left: 3px solid var(--accent2); }
  .chart-tooltip { position: absolute; pointer-events: none; z-index: 50; opacity: 0;
    transform: translate(-50%, calc(-100% - 10px)); transition: opacity .1s;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px;
    font-size: .8rem; color: var(--ink); white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.45); }
  .chart-tooltip .tt-title { display: flex; align-items: center; gap: 5px; font-weight: 600; margin-bottom: 4px; }
  .chart-tooltip .tt-title img { width: 16px; height: 16px; object-fit: contain; }
  .chart-tooltip .tt-row { display: flex; align-items: center; gap: 5px; }
  .chart-tooltip .sw { width: 10px; height: 10px; }
  /* Groups tab: one league table per group */
  .group-title { margin: 0 0 10px; font-size: 1.05rem; }
  .group-table .gteam { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .group-table .gteam span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .group-table img.flag { width: 20px; height: 20px; object-fit: contain; border-radius: 3px;
    background: #0d1426; flex: 0 0 auto; }
  .group-table .goalcol { text-align: center; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .group-table .gpts { font-weight: 700; }
  .group-table .ab-paren { color: var(--muted); font-weight: 400; }
  /* Head-to-head grid */
  .h2h-label { margin: 14px 0 6px; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .h2h-scroll { overflow-x: auto; }
  .h2h-table { border-collapse: collapse; }
  .h2h-table th, .h2h-table td { border: 1px solid var(--line); padding: 4px 6px; text-align: center;
    white-space: nowrap; font-variant-numeric: tabular-nums; font-size: .85rem; }
  .h2h-table .h2h-th img.flag { display: block; margin: 0 auto 2px; width: 18px; height: 18px; object-fit: contain; }
  .h2h-table .h2h-th .ab { font-size: .68rem; color: var(--muted); }
  .h2h-table .h2h-rowhead { text-align: left; }
  .h2h-table .h2h-rowhead img.flag { width: 18px; height: 18px; object-fit: contain; vertical-align: middle; margin-right: 5px; }
  .h2h-table .h2h-rowhead .ab { font-size: .8rem; }
  .h2h-table .h2h-self { background: rgba(255,255,255,.05); }
  .h2h-table .h2h-cell { cursor: pointer; }
  .h2h-table .h2h-cell:hover { background: rgba(61,220,151,.12); color: var(--accent); }
  .group-table .gteam { cursor: pointer; }
  .group-table tbody tr:hover .gteam { color: var(--accent); }
  .filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  /* Schedule tab: one row per finished game, one column per player */
  .schedule-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .schedule-table { border-collapse: collapse; min-width: 100%; font-size: .86rem; }
  .schedule-table th, .schedule-table td {
    padding: 7px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap;
  }
  .schedule-table thead th { color: var(--muted); font-size: .78rem; font-weight: 600; }
  /* Game column stays put while the player columns scroll sideways. */
  .schedule-table .game { text-align: left; position: sticky; left: 0; background: var(--bg); z-index: 1; }
  .schedule-table .game img.flag { width: 18px; height: 18px; object-fit: contain;
    vertical-align: middle; border-radius: 2px; margin: 0 4px; }
  .schedule-table .score { color: var(--accent2); font-weight: 700; padding: 0 3px; font-variant-numeric: tabular-nums; }
  /* Penalty-winner marker on a score digit — used for actual results and for a
     player's guessed penalty winner, in both the matrix and the picks tables */
  .penw { color: var(--accent); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
  /* "LIVE" markers for kicked-off, not-yet-final games (Results / Groups / Bracket) */
  .live-badge { color: var(--accent); font-weight: 700; font-size: .85rem; letter-spacing: .04em; }
  .schedule-table .score.score-live { color: var(--accent); }
  .h2h-table .h2h-cell.h2h-live { color: var(--accent); font-weight: 700; font-size: .7rem; }
  .ko-tag.ko-live { color: var(--accent); font-weight: 700; letter-spacing: .04em; }
  /* Info panel: what the last ESPN live fetch covered */
  .live-info { max-width: 680px; margin: 8px auto 0; padding: 8px 12px; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; font-size: .82rem; }
  .live-info .live-info-head { color: var(--muted); margin-bottom: 4px; }
  .live-info .live-info-row { font-variant-numeric: tabular-nums; cursor: pointer; border-radius: 5px; padding: 1px 4px; }
  .live-info .live-info-row:hover { background: rgba(255,255,255,.06); }
  .live-info .li-live { color: var(--accent); font-weight: 600; }
  .live-info .li-final { color: var(--accent2); font-weight: 600; }
  /* Provisional live points added to the standings, e.g. "0 + 2" */
  .live-delta { color: var(--accent); font-weight: 700; margin-left: 3px; }
  /* Provisional per-guess points (accent = not final) in the pick reveal + matrix */
  .reveal-table .num.live-pts,
  .pcell .p.live-pts { color: var(--accent); font-weight: 700; }
  .section-row th { text-align: left; background: var(--bg); color: var(--ink); font-size: .9rem;
    position: sticky; left: 0; padding-top: 14px; }
  .totals-row td { border-bottom: 2px solid var(--line); }
  .totals-row .game { color: var(--muted); font-weight: 600; }
  .totals-row .tot { color: var(--accent2); font-weight: 700; font-variant-numeric: tabular-nums; }
  .pcell { display: flex; flex-direction: column; align-items: center; gap: 1px; line-height: 1.15; }
  .pcell .g { font-variant-numeric: tabular-nums; }
  .pcell .p { font-size: .72rem; font-weight: 700; }
  .pts-exact { color: var(--accent); }
  .pts-gd { color: #59c2d6; }
  .pts-outcome { color: var(--accent2); }
  .pts-zero { color: var(--muted); }
  .pts-none { color: var(--line); }
  /* Knockout bracket — vertical folded tree (teams top & bottom, final centre) */
  .ko-scroll { overflow-x: auto; padding-bottom: 6px; }
  .ko-tree { --ko-unit: 80px; display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: max-content; margin: 0 auto; }
  .ko-round { display: flex; justify-content: center; gap: 8px; }
  /* Aligned rounds: a leaf-unit grid so each card centres over its two feeders */
  .ko-round.ko-grid { display: grid; gap: 0; justify-content: center; }
  .ko-round.ko-grid .ko-match { justify-self: center; }
  .ko-round.ko-center { align-items: start; margin: 4px 0; }
  .ko-round-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); margin-top: 8px; }
  .ko-match { width: 70px; background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 3px 4px; display: flex; flex-direction: column; gap: 2px; }
  .ko-match.ko-clickable { cursor: pointer; }
  .ko-match.ko-clickable:hover { border-color: var(--accent); }
  .ko-match.ko-final { width: 104px; border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
  .ko-match.ko-final.ko-clickable:hover { border-color: var(--gold); }
  .ko-match.ko-third { width: 104px; opacity: .9; }
  .ko-card-lbl { font-size: .6rem; color: var(--muted); text-align: center; }
  .ko-side { display: flex; align-items: center; gap: 4px; font-size: .74rem; line-height: 1.2; }
  .ko-side img.flag { width: 16px; height: 16px; object-fit: contain; flex: 0 0 auto; border-radius: 2px; background: #0d1426; }
  .ko-side .ko-noflag { width: 16px; height: 16px; flex: 0 0 auto; border-radius: 2px;
    background: repeating-linear-gradient(45deg, var(--line) 0 2px, transparent 2px 4px); }
  .ko-side .abbr { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .ko-side .sc { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--ink); }
  .ko-side.win .abbr { color: var(--ink); font-weight: 700; }
  .ko-side.win .sc { color: var(--accent); }
  .ko-tag { text-align: center; font-size: .6rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .msg { padding: 10px 12px; border-radius: 9px; margin: 10px 0; font-size: .9rem; display: none; }
  .msg.ok { background: rgba(61,220,151,.15); color: var(--accent); display: block; }
  .msg.err { background: rgba(255,107,107,.15); color: var(--bad); display: block; }
  .loading { color: var(--muted); text-align: center; padding: 24px; }
  footer { text-align: center; color: var(--muted); font-size: .75rem; padding: 16px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1 id="title" data-i18n="appTitle">⚽ World Cup Prediction Pool</h1>
    <div class="viewtoggle lang-toggle">
      <button id="lgEn" class="active lang-btn" onclick="setLang('en')" aria-label="English" title="English">
        <svg width="26" height="13" viewBox="0 0 60 30" aria-hidden="true">
          <clipPath id="ukS"><path d="M0,0 v30 h60 v-30 z"/></clipPath>
          <clipPath id="ukT"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath>
          <g clip-path="url(#ukS)">
            <path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
            <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
            <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#ukT)" stroke="#C8102E" stroke-width="4"/>
            <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
            <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/>
          </g>
        </svg>
      </button>

        <svg width="22" height="13" viewBox="0 0 5 3" aria-hidden="true">
          <rect width="5" height="1" y="0" fill="#000"/>
          <rect width="5" height="1" y="1" fill="#DD0000"/>
          <rect width="5" height="1" y="2" fill="#FFCE00"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main>
  <!-- Global bar: who you're playing as, view toggle + reload (shown on every tab).
       Stacked and right-aligned, sitting under the language flags in the header. -->
  <div class="topbar">
    <div class="topbar-row">
      <button id="playerBadge" class="badge" onclick="onBadgeClick(event)" style="display:none"></button>
      <button id="logoutBtn" class="reload-btn" onclick="logout()" data-i18n="logout" style="display:none">Log out</button>
    </div>
    <div class="topbar-row">
      <div class="viewtoggle" id="viewToggle">
        <span class="vt-label" data-i18n="viewLabel">View:</span>
        <button id="vtGroup" onclick="setView('group')" data-i18n="byGroup">By group</button>
        <button id="vtDate" class="active" onclick="setView('date')" data-i18n="chronological">Chronological</button>
      </div>
      <button id="liveBtn" class="reload-btn" onclick="fetchLiveScores()" data-i18n="liveScores" disabled>⚡ Live scores</button>
      <button id="reloadBtn" class="reload-btn" onclick="reloadData()" data-i18n="reloadData">↻ Reload data</button>
    </div>
  </div>

  <!-- What the last ESPN live fetch covered (auto-fire on load or the Live button) -->
  <div id="liveInfo" class="live-info" style="display:none"></div>

  <div class="tabs">
    <button id="tabWho" class="active" onclick="showTab('who')" data-i18n="tabWho">Player</button>
    <button id="tabPredict" onclick="showTab('predict')" data-i18n="tabPredict">Make picks</button>
    <button id="tabSchedule" onclick="showTab('schedule')" data-i18n="tabSchedule">Schedule</button>
    <button id="tabGroups" onclick="showTab('groups')" data-i18n="tabGroups">Groups</button>
    <button id="tabKnockout" onclick="showTab('knockout')" data-i18n="tabKnockout">Knockout</button>
    <button id="tabStandings" onclick="showTab('standings')" data-i18n="tabStandings">Standings</button>
  </div>

  <!-- WHO ARE YOU (pick your league, then your name) — the landing tab -->
  <section id="who">
    <div class="card">
      <label for="leagueSelect" data-i18n="chooseLeague">Choose your league</label>
      <select id="leagueSelect" onchange="onLeagueChosen()"><option value="" data-i18n="selectLeague">— select your league —</option></select>

      <div id="leagueGated" style="display:none">
        <label for="player" data-i18n="whoLabel">Who are you?</label>
        <select id="player" onchange="onPlayerChosen()"><option value="" data-i18n="selectName">— select your name —</option></select>
        <form class="addrow" id="loginRow" style="display:none" onsubmit="login(); return false;">
          <input id="loginUser" type="text" class="visually-hidden" autocomplete="username" tabindex="-1" aria-hidden="true" />
          <span class="pw-wrap">
            <input id="loginPw" type="password" autocomplete="current-password" data-i18n-ph="passwordPlaceholder" placeholder="Password" />
            <button type="button" class="pw-toggle" onclick="togglePw('loginPw', this)"></button>
          </span>
          <button id="loginBtn" type="submit" data-i18n="continueBtn">Continue</button>
        </form>
        <div class="addlabel" data-i18n="addLabel">New here? Create your account</div>
        <form class="addrow" id="addForm" onsubmit="addMe(); return false;">
          <input id="newName" type="text" maxlength="40" autocomplete="username" data-i18n-ph="addNamePlaceholder" placeholder="Your name" />
          <span class="pw-wrap">
            <input id="newPw" type="password" maxlength="64" autocomplete="new-password" data-i18n-ph="passwordPlaceholder" placeholder="Your password" />
            <button type="button" class="pw-toggle" onclick="togglePw('newPw', this)"></button>
          </span>
          <span class="pw-wrap">
            <input id="leaguePw" type="password" maxlength="64" autocomplete="off" data-i18n-ph="leaguePasswordPlaceholder" placeholder="League password" />
            <button type="button" class="pw-toggle" onclick="togglePw('leaguePw', this)"></button>
          </span>
          <button id="addBtn" type="submit" data-i18n="addMe">Add me</button>
        </form>
      </div>
      <div id="addMsg" class="msg"></div>
    </div>
    <div id="scoringRules" class="card scoring-rules"></div>
  </section>

  <!-- PREDICT -->
  <section id="predict" style="display:none">
    <div id="loginNotice" class="msg"></div>
    <div class="pickbar">
      <span class="clocktext"><span data-i18n="nowLabel">Now:</span> <span id="clock"></span></span>
      <div class="pickfilters">
        <label class="hidetoggle"><input type="checkbox" id="hideStarted" onchange="applyPickFilters()" /> <span data-i18n="hideStarted">Hide started games</span></label>
        <label class="hidetoggle"><input type="checkbox" id="onlyUpcoming" onchange="applyPickFilters()" /> <span id="onlyUpcomingLbl">Show only upcoming games</span></label>
        <label class="hidetoggle"><input type="checkbox" id="onlyNoPick" onchange="if(this.checked)document.getElementById('onlyMyPick').checked=false; applyPickFilters()" /> <span data-i18n="onlyNoPicks">Show only games without picks</span></label>
        <label class="hidetoggle"><input type="checkbox" id="onlyMyPick" onchange="if(this.checked)document.getElementById('onlyNoPick').checked=false; applyPickFilters()" /> <span data-i18n="onlyMyPicks">Show only your picks</span></label>
      </div>
    </div>
    <button id="moreFiltersBtn" type="button" class="morefilters-toggle" onclick="toggleGroupFilterPanel()" style="display:none"></button>
    <div id="groupFilter" class="groupfilter" style="display:none">
      <span class="vt-label" data-i18n="showLabel">Show:</span>
      <div class="quickbtns">
        <button class="quickbtn" onclick="setGroupFilter('all')" data-i18n="qbShowAll">Show all</button>
        <button class="quickbtn" onclick="setGroupFilter('none')" data-i18n="qbHideAll">Hide all</button>
        <button class="quickbtn" onclick="setGroupFilter('groups')" data-i18n="qbGroupStage">Group stage</button>
        <button class="quickbtn" onclick="setGroupFilter('knockouts')" data-i18n="qbKnockouts">Knockouts</button>
      </div>
      <span id="groupChips"></span>
    </div>
    <div id="matches"><div class="loading" data-i18n="loadingMatches">Loading matches…</div></div>
    <div id="msg" class="msg"></div>
    <button class="primary" id="submitBtn" onclick="submitGuesses()" disabled data-i18n="submit">Submit my picks</button>
  </section>

  <!-- SCHEDULE (completed games + everyone's guesses) -->
  <section id="schedule" style="display:none">
    <div class="viewtoggle" id="scheduleViewToggle" style="margin-bottom:10px">
      <button id="svTable" class="active" onclick="setScheduleView('table')" data-i18n="svTable">Table</button>
      <button id="svGame" onclick="setScheduleView('game')" data-i18n="svGame">By game</button>
    </div>
    <label class="hidetoggle" style="margin-bottom:10px"><input type="checkbox" id="scheduleTodayOnly" onchange="setScheduleTodayOnly(this.checked)" /> <span data-i18n="todayOnly">Show only today's games</span></label>
    <div id="scheduleMeta" class="sub" style="margin-bottom:10px"></div>
    <div id="scheduleBody"><div class="loading" data-i18n="loading">Loading…</div></div>
  </section>

  <!-- GROUPS (live group tables from the fixtures) -->
  <section id="groups" style="display:none">
    <div id="groupsBody"><div class="loading" data-i18n="loading">Loading…</div></div>
  </section>

  <!-- KNOCKOUT (full bracket tree, folded around the final) -->
  <section id="knockout" style="display:none">
    <div id="knockoutBody"><div class="loading" data-i18n="loading">Loading…</div></div>
  </section>

  <!-- STANDINGS -->
  <section id="standings" style="display:none">
    <div class="card">
      <div id="standingsMeta" class="sub" style="margin-bottom:10px"></div>
      <div class="sub standings-hint" data-i18n="clickPlayerHint" style="margin-bottom:10px">Tip: click a name to see their picks.</div>
      <table>
        <thead><tr><th data-i18n="thRank">#</th><th data-i18n="thPlayer">Player</th><th class="num" data-i18n="thPts">Pts</th><th class="num" data-i18n="thExact" data-i18n-title="ttExact">Exact</th><th class="num" data-i18n="thGd" data-i18n-title="ttGd">GD</th><th class="num" data-i18n="thGdErr" data-i18n-title="ttGdErr">GD err</th></tr></thead>
        <tbody id="standingsBody"><tr><td colspan="6" class="loading" data-i18n="loading">Loading…</td></tr></tbody>
      </table>
    </div>
    <div id="pointsChart"></div>
  </section>
</main>

<!-- Translation tables (I18N / STAGE_DE / DE_NAMES / translatePlaceholder).
     Must load before the inline script below, which reads them. -->
<script src="i18n.js"></script>
<script src="scoring.js"></script>
<script src="groups.js"></script>
<script src="bracket.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  // ====== CONFIG ===========================================================
  // 1) Paste your deployed Apps Script web-app URL (ends in /exec):
  const SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbxDl0jYS99LBobeb-g4bAJgQ4r9-GZwOeOqFm540YiDfeiQaXnblgdG6VjDIsRob848/exec";
  // 2) Where the fixtures live (ESPN-shaped file produced by python/fetch_fixtures.py):
  const FIXTURES_URL = "data/wc2026_fixtures.json";
  // 3) Optional: the "Fav by 1" benchmark picks (python/apply_model.py sidecar).
  //    A synthetic standings-only player that backs the favourite by one goal.
  const FAV_PICKS_URL = "data/wc2026_fav_by_1.json";
  // (Scoring lives in scoring.js: SCORING + scorePick()/scoreGroup(), loaded above.)
  // =========================================================================

  // ====== i18n ==============================================================
  // Translation TABLES (I18N, STAGE_DE, DE_NAMES) + translatePlaceholder() live
  // in i18n.js, loaded just before this script. The language-aware glue that
  // reads them against the live LANG state stays here.
  function t(key) { return I18N[LANG][key]; }
  function localeTag() { return LANG === 'de' ? 'de-DE' : 'en-US'; }
  function stageLabel(stage) {
    if (LANG === 'de') return STAGE_DE[stage.slug] || stage.label || 'Knockout';
    return stage.label || 'Knockout';
  }
  // =========================================================================

  let MATCHES = [];
  let SHEET = { players: [], guesses: [] };  // cached sheet data
  let FAV_PICKS = null;  // "Fav by 1" benchmark: [{matchId,home,away}] once loaded, [] if unavailable
  let playersLoaded = false;                 // public player list loaded
  let guessesLoaded = false;                 // private (auth'd) guesses loaded for the current login
  let FIXTURE_TITLE = null;  // set if the fixtures file carries its own title
  let VIEW_MODE = 'date';    // 'group' = by group/stage · 'date' = chronological (default)
  let SCHEDULE_VIEW = 'table';  // schedule tab layout: 'table' (matrix) | 'game' (read-only cards)
  let SCHEDULE_FILTER = null;   // by-game view: null | {type:'match',id} | {type:'team',abbr}
  let SCHEDULE_TODAY_ONLY = false;  // results tab: show only games kicked off in the last 24h
  let LANG = 'en';           // 'en' | 'de' — affects all UI text + country names
  let HIDE_STARTED = false;  // pick tab: hide games that are scored / kicked off
  let lockSignature = '';    // ids of locked games at last render; drives auto-relock on the clock tick
  let HIDDEN_GROUPS = new Set();  // pick tab (group view): section keys toggled off
  let SHOW_GROUP_FILTER = false;  // pick tab: is the group/stage filter panel expanded?
  let ONLY_UPCOMING = false;      // pick tab: only games kicking off within COUNTDOWN_SOON_MS
  let ONLY_NOPICK = false;        // pick tab: only games without a saved pick
  let ONLY_MYPICK = false;        // pick tab: only games the player has picked
  let FAV_GUESS = false;          // ?fav gimmick: prefill 2-1 for the betting favourite
  let AUTH = null;                // { name, token } once the player logs in / adds themselves
  let LEAGUES = [];               // [{id, name}] available pools (from the backend)
  let LEAGUE = null;              // current league id
  let LEAGUE_NAME = '';           // current league display name (for the badge)

  function setView(mode) {
    if (mode === VIEW_MODE) return;
    VIEW_MODE = mode;
    document.getElementById('vtGroup').classList.toggle('active', mode === 'group');
    document.getElementById('vtDate').classList.toggle('active', mode === 'date');
    renderMatches();   // predict tab (preserves typed scores via captureDrafts)
    // Schedule groups the same way; re-render it if it's the open tab.
    if (document.getElementById('schedule').style.display !== 'none') loadSchedule();
  }

  // Swap every static label carrying a data-i18n key, plus the page title and
  // <html lang>. Interpolated strings (scoring note, counts) are handled where
  // they're built.
  function applyLabels() {
    document.documentElement.lang = LANG;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = I18N[LANG][el.dataset.i18n];
      if (typeof v === 'string') el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const v = I18N[LANG][el.dataset.i18nPh];
      if (typeof v === 'string') el.placeholder = v;
    });
    document.querySelectorAll('[data-i18n-title]').forEach(el => {
      const v = I18N[LANG][el.dataset.i18nTitle];
      if (typeof v === 'string') el.title = v;
    });
    // Password reveal toggles: paint the eye icon for the current reveal state
    // (also the initial render) with a localized aria-label / tooltip.
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      const inp = btn.closest('.pw-wrap').querySelector('input');
      setPwToggle(btn, inp.type === 'text');
    });
    // The fixtures file may override the title; otherwise use the localized one.
    document.getElementById('title').textContent = FIXTURE_TITLE ? '⚽ ' + FIXTURE_TITLE : t('appTitle');
    document.title = FIXTURE_TITLE || t('docTitle');
    renderScoringRules();
    drawLiveInfo();          // re-localize the live-fetch note (keeps the original time)
    updatePlayerBadge();
    updateClock();
    // The "only upcoming" checkbox label carries the current threshold (e.g. "120h").
    const upLbl = document.getElementById('onlyUpcomingLbl');
    if (upLbl) upLbl.textContent = t('onlyUpcoming')(Math.round(COUNTDOWN_SOON_MS / (60 * 60 * 1000)));
  }

  // Full scoring rules panel (group + knockout), shown in the login tab. Point
  // values come straight from the SCORING / KO_SCORING constants in scoring.js.
  function renderScoringRules() {
    const el = document.getElementById('scoringRules');
    if (el) el.innerHTML = t('scoringRules')(SCORING, KO_SCORING);
  }

  // Read the three pick-tab filter checkboxes and re-render.
  function applyPickFilters() {
    HIDE_STARTED = document.getElementById('hideStarted').checked;
    ONLY_UPCOMING = document.getElementById('onlyUpcoming').checked;
    ONLY_NOPICK = document.getElementById('onlyNoPick').checked;
    ONLY_MYPICK = document.getElementById('onlyMyPick').checked;
    renderMatches();
  }

  // Eye / eye-off icons (Feather) for the password reveal toggle.
  const EYE_SVG = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" ' +
    'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
    '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYE_OFF_SVG = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" ' +
    'stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
    '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>' +
    '<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>' +
    '<line x1="1" y1="1" x2="23" y2="23"/></svg>';

  // Paint a reveal toggle for the given state (revealed = password is showing).
  // The eye-off icon means "currently visible, click to hide".
  function setPwToggle(btn, revealed) {
    btn.innerHTML = revealed ? EYE_OFF_SVG : EYE_SVG;
    btn.setAttribute('aria-label', t(revealed ? 'hidePw' : 'showPw'));
    btn.setAttribute('title', t(revealed ? 'hidePw' : 'showPw'));
  }

  // Show/hide a password field, swapping the eye icon to match.
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const revealed = inp.type === 'password';   // about to become visible
    inp.type = revealed ? 'text' : 'password';
    setPwToggle(btn, revealed);
  }

  // Group/stage filter chips (group view only). Lists every section from the
  // full fixture set so a toggled-off (and thus absent) section can be re-shown.
  function renderGroupFilter() {
    const bar = document.getElementById('groupFilter');
    const btn = document.getElementById('moreFiltersBtn');
    // The group/stage filter only applies in group view; hide it (and its toggle) otherwise.
    if (VIEW_MODE !== 'group' || !MATCHES.length) {
      bar.style.display = 'none';
      if (btn) btn.style.display = 'none';
      return;
    }
    if (btn) { btn.style.display = ''; btn.textContent = (SHOW_GROUP_FILTER ? '▾ ' : '▸ ') + t('moreFilters'); }
    bar.style.display = SHOW_GROUP_FILTER ? '' : 'none';
    if (!SHOW_GROUP_FILTER) return;   // panel collapsed — no need to build the chips
    const chips = document.getElementById('groupChips');
    chips.innerHTML = sectionize(MATCHES).map(s =>
      '<button class="chip' + (HIDDEN_GROUPS.has(s.key) ? '' : ' on') + '" data-key="' +
      escapeHtml(s.key) + '">' + escapeHtml(s.title) + '</button>'
    ).join('');
    chips.onclick = e => { const b = e.target.closest('.chip'); if (b) toggleGroup(b.dataset.key); };
  }

  // Show/hide the group/stage filter panel ("more filter options").
  function toggleGroupFilterPanel() {
    SHOW_GROUP_FILTER = !SHOW_GROUP_FILTER;
    renderGroupFilter();
  }

  function toggleGroup(key) {
    if (HIDDEN_GROUPS.has(key)) HIDDEN_GROUPS.delete(key);
    else HIDDEN_GROUPS.add(key);
    renderMatches();
  }

  // Quick filters. Group-stage sections have order 0/1; knockout rounds order 2.
  function setGroupFilter(mode) {
    const sections = sectionize(MATCHES);
    if (mode === 'all') HIDDEN_GROUPS = new Set();
    else if (mode === 'none') HIDDEN_GROUPS = new Set(sections.map(s => s.key));
    else if (mode === 'groups') HIDDEN_GROUPS = new Set(sections.filter(s => s.order === 2).map(s => s.key));
    else if (mode === 'knockouts') HIDDEN_GROUPS = new Set(sections.filter(s => s.order <= 1).map(s => s.key));
    renderMatches();
  }

  // Live clock — the exact "now" the lock compares kickoffs against (local time).
  function updateClock() {
    const el = document.getElementById('clock');
    if (!el) return;
    el.textContent = new Date().toLocaleString(localeTag(),
      { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  const COUNTDOWN_SOON_MS = 60 * 60 * 60 * 1000;   // within this window (60h) → "upcoming" highlight + filter

  // "Starts in 3h 12m" from ms-until-kickoff (two most-significant units).
  function fmtCountdown(ms) {
    const total = Math.max(0, Math.floor(ms / 1000));
    const d = Math.floor(total / 86400);
    const h = Math.floor((total % 86400) / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    return t('countdown')(d, h, m, s);
  }

  // Refresh every non-locked game's countdown text in place (no re-render).
  function updateCountdowns() {
    const now = Date.now();
    document.querySelectorAll('#matches .countdown[data-ko]').forEach(el => {
      const ms = Number(el.dataset.ko) - now;
      el.textContent = fmtCountdown(ms);
      el.classList.toggle('soon', ms <= COUNTDOWN_SOON_MS);
    });
  }

  // Once a second: tick the clock + countdowns, and (when the picks tab is open
  // and the user isn't mid-typing) re-render if a game has just crossed kickoff.
  function tick() {
    updateClock();
    updateLiveButton();   // enable/disable as games kick off / finish (cheap)
    if (document.getElementById('predict').style.display === 'none') return;
    updateCountdowns();   // cheap text-only update, safe while typing
    const a = document.activeElement;
    if (a && a.matches && a.matches('#matches input')) return;
    const sig = MATCHES.filter(isLocked).map(m => m.id).join(',');
    if (sig !== lockSignature) renderMatches();
  }

  function setLang(lang) {
    if (lang === LANG) return;
    LANG = lang;
    document.getElementById('lgEn').classList.toggle('active', lang === 'en');
    document.getElementById('lgDe').classList.toggle('active', lang === 'de');
    applyLabels();
    renderMatches();   // preserves typed scores (see captureDrafts)
    // Re-render the visible data tab (schedule/standings) so its labels, dates
    // and meta line come back in the new language.
    const tab = visibleDataTab();
    if (tab) tab.onShow();
  }

  // Tabs: section id, its button id, and an optional loader run when shown.
  const TABS = [
    { name: 'who',       btn: 'tabWho' },
    { name: 'predict',   btn: 'tabPredict' },
    { name: 'schedule',  btn: 'tabSchedule',  onShow: () => loadSchedule() },
    { name: 'groups',    btn: 'tabGroups',    onShow: () => renderGroups() },
    { name: 'knockout',  btn: 'tabKnockout',  onShow: () => renderKnockout() },
    { name: 'standings', btn: 'tabStandings', onShow: () => loadStandings() },
  ];

  function showTab(which) {
    TABS.forEach(tab => {
      const active = tab.name === which;
      document.getElementById(tab.name).style.display = active ? '' : 'none';
      document.getElementById(tab.btn).classList.toggle('active', active);
    });
    const tab = TABS.find(t => t.name === which);
    if (tab && tab.onShow) tab.onShow();
  }

  // The data tab currently on screen (schedule/standings), if any — used to
  // refresh it after a language switch.
  function visibleDataTab() {
    return TABS.find(t => t.onShow && document.getElementById(t.name).style.display !== 'none');
  }

  function showMsg(id, text, kind) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'msg ' + kind;
  }
  function msg(text, kind) { showMsg('msg', text, kind); }       // near the submit button
  function addMsg(text, kind) { showMsg('addMsg', text, kind); } // in the add-name card
  function clearMsg(id) { const el = document.getElementById(id); el.textContent = ''; el.className = 'msg'; }

  // Session token persistence (keeps you logged in across refreshes). One token
  // per league, since identity is league-scoped — so you can be logged into more
  // than one pool in the same browser.
  function tokenKey(league)        { return 'wc26_token_' + (league || ''); }
  function loadToken(league)       { try { return localStorage.getItem(tokenKey(league)); } catch (e) { return null; } }
  function saveToken(league, t)    { try { localStorage.setItem(tokenKey(league), t); } catch (e) {} }
  function clearToken(league)      { try { localStorage.removeItem(tokenKey(league)); } catch (e) {} }
  // Remember the last league chosen, so a bare visit (no ?league=) reopens it.
  const LEAGUE_KEY = 'wc26_league';
  function loadLastLeague()        { try { return localStorage.getItem(LEAGUE_KEY); } catch (e) { return null; } }
  function saveLastLeague(id)      { try { localStorage.setItem(LEAGUE_KEY, id); } catch (e) {} }
  // Canonical league record for an id (case-insensitive), or null.
  function findLeague(id) {
    if (!id) return null;
    const n = String(id).toLowerCase();
    return LEAGUES.find(l => l.id.toLowerCase() === n) || null;
  }

  // ---- ESPN-schema accessors ----------------------------------------------
  // Names/logos/scores live on nested home/away objects; isolate that here so
  // the rest of the code doesn't care about the feed shape.
  function teamName(side) {
    if (!side) return 'TBD';
    const english = side.displayName || side.name || 'TBD';
    if (LANG === 'de') {
      return DE_NAMES[side.abbreviation] || translatePlaceholder(english) || english;
    }
    return english;
  }
  function teamAbbr(side)  { return (side && (side.abbreviation || side.shortDisplayName)) || teamName(side); }
  function teamLogo(side)  { return (side && side.logo) || ''; }
  function isFinished(m)   { return !!(m.status && m.status.completed); }
  function homeScore(m)    { return m.home ? m.home.score : null; }
  function awayScore(m)    { return m.away ? m.away.score : null; }
  // Kicked off yet? Compares the kickoff instant to the live clock (UTC-correct
  // regardless of the viewer's timezone).
  function isStarted(m)    { const d = kickoffDate(m.date); return d ? d.getTime() <= Date.now() : false; }
  // Picks are locked once a game has a result OR has kicked off.
  function isLocked(m)     { return isFinished(m) || isStarted(m); }
  // Live = kicked off (by clock) but not yet final. We measure ONLY by kickoff
  // time, not the feed's pre/in state — so a started-but-unscored game is "live".
  // Live games are NEVER scored; they show a "live" marker until completed.
  function isLive(m)       { return isStarted(m) && !isFinished(m); }

  // For a penalty-decided knockout game, the shootout outcome from the winner's
  // perspective; null for any other game. shootout tallies may be absent.
  function shootoutResult(m) {
    if (!m || (m.decidedBy || 'regulation') !== 'penalties' || !m.winner) return null;
    const winSide  = m.winner === 'home' ? m.home : m.away;
    const loseSide = m.winner === 'home' ? m.away : m.home;
    const winSO    = winSide  && winSide.shootout  != null ? winSide.shootout  : null;
    const loseSO   = loseSide && loseSide.shootout != null ? loseSide.shootout : null;
    return { winSide, loseSide, winSO, loseSO };
  }

  // How a knockout game was decided, as plain text:
  // penalties → "France win 4:3 on penalties"; extra time → "a.e.t." / "n.V.".
  // Empty for regulation results and group games.
  function resultNoteText(m) {
    if (!isKnockout(m) || !isFinished(m)) return '';
    const decided = m.decidedBy || 'regulation';
    if (decided === 'penalties') {
      const so = shootoutResult(m);
      if (!so) return '';
      const name = teamName(so.winSide);
      return (so.winSO != null && so.loseSO != null)
        ? t('wonOnPens')(name, so.winSO, so.loseSO)
        : t('wonOnPensNoScore')(name);
    }
    if (decided === 'extra_time') return t('afterExtraTime');
    return '';
  }

  // Full-width caption for the game view (penalties get a ⚽ marker).
  function resultNote(m) {
    const txt = resultNoteText(m);
    if (!txt) return '';
    const icon = (m.decidedBy === 'penalties') ? '⚽ ' : '';
    return '<div class="pen-result">' + icon + escapeHtml(txt) + '</div>';
  }

  // "h–a" with one side's goal tally marked (bold + underline + accent) to flag a
  // penalty winner — used for both actual results and guessed penalty winners.
  function scoreWithBold(home, away, side) {
    let h = String(home), a = String(away);
    if (side === 'home') h = '<b class="penw">' + h + '</b>';
    else if (side === 'away') a = '<b class="penw">' + a + '</b>';
    return h + '–' + a;
  }

  // Final score for the matrix row header, with the shootout winner's goal tally
  // marked when a knockout draw was decided on penalties.
  function finalScoreHtml(m, hs, as) {
    return shootoutResult(m) ? scoreWithBold(hs, as, m.winner) : (hs + '–' + as);
  }

  // ---- Live scores (optional, client-direct from ESPN) ----------------------
  // On demand (button / auto-fire) we pull today's scoreboard straight from ESPN
  // and overlay it on games our fixtures still consider live. Two outcomes per
  // game: ESPN says it's FINAL (the fixtures JSON just hasn't refreshed yet) → we
  // promote the match to final in memory so it's treated exactly like a JSON-final
  // game (official scoring, penalties and all); ESPN says it's in progress → we
  // stash the current score for a provisional "live" display + standings overlay.
  // Nothing here is persisted or sent to the server; it's re-derived each fetch.

  const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
  let LIVE_SCORES = {};   // matchId -> {home, away} for ESPN-in-progress games (provisional)
  let PROMOTED = {};      // matchId -> true for games we promoted to final via ESPN this session
  let LAST_LIVE = null;   // { fetched, at:Date } of the most recent fetch (so the info panel re-localizes)

  // Where to fetch the scoreboard for a given YYYYMMDD. A same-origin ?live=<path>
  // override swaps in canned ESPN-shaped test data (mirrors the ?fixtures= seam).
  function liveScoreboardUrl(yyyymmdd) {
    const override = new URLSearchParams(location.search).get('live');
    if (override && !/^(https?:)?\/\//i.test(override)) return override;
    return ESPN_SCOREBOARD + '?dates=' + yyyymmdd + '&limit=950';
  }

  function intOrNull(v) { const n = parseInt(v, 10); return isNaN(n) ? null : n; }

  // Parse one ESPN scoreboard event into the fields we use. Mirrors the Python
  // fetch_fixtures.extract_match (status name → decidedBy, score/shootout/winner).
  function extractLiveEvent(ev) {
    const comp = (ev && ev.competitions && ev.competitions[0]) || {};
    const cs = comp.competitors || [];
    const hc = cs.find(c => c.homeAway === 'home');
    const ac = cs.find(c => c.homeAway === 'away');
    if (!hc || !ac) return null;
    const st = (comp.status && comp.status.type) || {};
    const completed = !!st.completed;
    const decidedBy = !completed ? null
      : st.name === 'STATUS_FINAL_PEN' ? 'penalties'
      : st.name === 'STATUS_FINAL_AET' ? 'extra_time' : 'regulation';
    const side = c => ({ score: intOrNull(c.score), shootout: intOrNull(c.shootoutScore), winner: !!c.winner });
    return { id: String(ev.id), completed, state: st.state, decidedBy, home: side(hc), away: side(ac) };
  }

  // Overlay ESPN events onto the in-memory fixtures (only games we consider live).
  // Returns [{m, finished}] for each live game the fetch actually covered.
  function applyLiveData(events) {
    const byId = {};
    MATCHES.forEach(m => { byId[m.id] = m; });
    const fetched = [];
    (events || []).forEach(ev => {
      const e = extractLiveEvent(ev);
      if (!e) return;
      const m = byId[e.id];
      // Live games — or ones we already promoted this session (so a re-fetch keeps
      // listing them as finished instead of dropping them from the info panel).
      if (!m || (!isLive(m) && !PROMOTED[e.id])) return;
      if (e.completed) {
        PROMOTED[e.id] = true;
        fetched.push({ m: m, finished: true });
        // ESPN is ahead of the JSON: promote to FINAL so the whole app treats it
        // like any completed game (official scoring, incl. the penalty result).
        m.home.score = e.home.score; m.away.score = e.away.score;
        m.home.shootout = e.home.shootout; m.away.shootout = e.away.shootout;
        m.home.winner = e.home.winner; m.away.winner = e.away.winner;
        m.winner = e.home.winner ? 'home' : e.away.winner ? 'away'
          : (e.home.score != null && e.home.score === e.away.score ? 'draw' : null);
        m.decidedBy = e.decidedBy;
        m.status = m.status || {};
        m.status.completed = true; m.status.state = 'post';
        delete LIVE_SCORES[e.id];
      } else if (e.home.score != null && e.away.score != null) {
        LIVE_SCORES[e.id] = { home: e.home.score, away: e.away.score };
        fetched.push({ m: m, finished: false });
      }
    });
    return fetched;
  }

  // Record what the last ESPN fetch covered (auto-fire or button) and show it.
  // Called only after a fetch actually ran, so we show it even for 0 matches.
  function renderLiveInfo(fetched) {
    if (!fetched) return;
    LAST_LIVE = { fetched: fetched, at: new Date() };
    drawLiveInfo();
  }

  // (Re)paint the live-info panel from LAST_LIVE in the current language — so a
  // language swap re-localizes it, keeping the original fetch time.
  function drawLiveInfo() {
    const el = document.getElementById('liveInfo');
    if (!el || !LAST_LIVE) return;
    // Each row links to the schedule/results, filtered to that game (same
    // clickthrough as the groups/knockout tabs).
    const rows = LAST_LIVE.fetched.map(f =>
      '<div class="live-info-row" onclick="showGameInSchedule(\'' + escapeHtml(f.m.id) + '\')">' +
      escapeHtml(teamAbbr(f.m.home)) + ' – ' + escapeHtml(teamAbbr(f.m.away)) +
      ' <span class="' + (f.finished ? 'li-final' : 'li-live') + '">(' +
      escapeHtml(t(f.finished ? 'liFinished' : 'liOngoing')) + ')</span></div>').join('');
    const time = LAST_LIVE.at.toLocaleTimeString(localeTag(), { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    el.innerHTML = '<div class="live-info-head">' + escapeHtml(t('liFetched')(LAST_LIVE.fetched.length, time)) + '</div>' + rows;
    el.style.display = '';
  }

  // The fetched in-progress score for a game, or null.
  function liveScoreOf(m) { return (m && LIVE_SCORES[m.id]) || null; }

  // A synthetic "as if it ended right now" match, so the existing scorer can give
  // PROVISIONAL points for an in-progress game. A level knockout score is treated
  // like a draw-after-ET (no advancer yet → outright picks score 0, draw picks get
  // the draw points); any decisive score is treated as a regulation result.
  function liveAsFinal(m, hs, as) {
    const winner = hs > as ? 'home' : (as > hs ? 'away' : null);
    const decidedBy = (isKnockout(m) && hs === as) ? 'penalties' : 'regulation';
    return Object.assign({}, m, {
      home: Object.assign({}, m.home, { score: hs }),
      away: Object.assign({}, m.away, { score: as }),
      winner: winner, decidedBy: decidedBy,
    });
  }

  // Provisional standings deltas from the currently in-progress games. Mirrors the
  // points/exact/gd accounting in computeStandings, but over LIVE_SCORES games.
  function computeLiveDeltas(guesses) {
    const byId = {};
    MATCHES.forEach(m => { byId[m.id] = m; });
    const delta = {}, hasPick = {};
    (guesses || []).forEach(g => {
      const live = LIVE_SCORES[g.matchId];
      const m = byId[g.matchId];
      if (!live || !m) return;
      hasPick[g.player] = true;
      if (!delta[g.player]) delta[g.player] = { points: 0, exact: 0, gd: 0, gdErr: 0 };
      delta[g.player].points += scorePick(g, liveAsFinal(m, live.home, live.away));
      if (g.home === live.home && g.away === live.away) delta[g.player].exact += 1;
      if (g.home !== g.away && (g.home - g.away) === (live.home - live.away)) delta[g.player].gd += 1;
      delta[g.player].gdErr += Math.abs((g.home - g.away) - (live.home - live.away));
    });
    return { delta, hasPick };
  }

  // Unique YYYYMMDD (UTC) buckets to query for the live games — each game's
  // kickoff day plus the day before, to cover any scoreboard date bucketing.
  function liveQueryDates() {
    const pad = n => (n < 10 ? '0' : '') + n;
    const fmt = d => '' + d.getUTCFullYear() + pad(d.getUTCMonth() + 1) + pad(d.getUTCDate());
    const set = {};
    // Live games, plus ones promoted this session — so a re-fetch still queries
    // their day and the info panel keeps showing them as finished.
    MATCHES.filter(m => isLive(m) || PROMOTED[m.id]).forEach(m => {
      const d = kickoffDate(m.date);
      if (!d) return;
      set[fmt(d)] = true;
      set[fmt(new Date(d.getTime() - 86400000))] = true;
    });
    return Object.keys(set);
  }

  // Fetch + overlay live scores, then refresh whatever's on screen. `silent` skips
  // the button's busy state (used by the on-load auto-fire).
  async function fetchLiveScores(silent) {
    const dates = liveQueryDates();
    if (!dates.length) return;
    const btn = document.getElementById('liveBtn');
    if (!silent && btn) btn.disabled = true;
    try {
      // With a same-origin ?live= override, every date resolves to the same canned
      // file → fetch once. Otherwise hit ESPN for EACH date (the game's UTC day and
      // the day before, to cover scoreboard date bucketing).
      const liveParam = new URLSearchParams(location.search).get('live');
      const usingOverride = !!liveParam && !/^(https?:)?\/\//i.test(liveParam);
      const urls = usingOverride ? [liveScoreboardUrl(dates[0])] : dates.map(liveScoreboardUrl);
      const responses = await Promise.all(urls.map(u =>
        fetch(u).then(r => r.ok ? r.json() : null).catch(() => null)));
      const events = responses.filter(Boolean).flatMap(j => j.events || []);
      renderLiveInfo(applyLiveData(events));  // note which games this fetch covered
      renderMatches();                       // pick tab (locks unaffected; promoted games now final)
      const tab = visibleDataTab();
      if (tab) await tab.onShow();            // re-render the open data tab with the overlay
    } catch (e) { /* leave the last good state on a transient failure */ }
    updateLiveButton();
  }

  // Enable the live button only while a game is in progress (per the clock).
  function updateLiveButton() {
    const btn = document.getElementById('liveBtn');
    if (!btn) return;
    btn.disabled = !MATCHES.some(isLive);
  }

  // "2026-06-11T19:00Z" → a Date. ESPN omits seconds, which some browsers won't
  // parse, so normalise to "...:00Z" first. Returns null on a missing/bad value.
  function kickoffDate(iso) {
    if (!iso) return null;
    const d = new Date(iso.replace(/T(\d{2}):(\d{2})Z$/, 'T$1:$2:00Z'));
    return isNaN(d) ? null : d;
  }

  // A readable local date/time for a match card, in the active language's locale.
  function kickoffLabel(iso) {
    const d = kickoffDate(iso);
    if (!d) return iso || '';
    return d.toLocaleString(localeTag(), {
      weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  }

  async function init() {
    // ?fav — prefill picks with 2-1 for the betting favourite (gimmick).
    FAV_GUESS = new URLSearchParams(location.search).has('fav');
    // Optional ?lang=de / ?lang=en to start in a given language.
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang === 'de' || urlLang === 'en') {
      LANG = urlLang;
      document.getElementById('lgEn').classList.toggle('active', LANG === 'en');
      document.getElementById('lgDe').classList.toggle('active', LANG === 'de');
    }
    applyLabels();   // paint all static labels in the chosen language
    if (SCRIPT_URL.startsWith('PASTE')) {
      document.getElementById('matches').innerHTML =
        '<div class="card" style="color:var(--bad)">' + escapeHtml(t('setScriptUrl')) + '</div>';
    }
    // Fixtures load independently of the backend so picks render even if the URL isn't set yet.
    // Dev override: ?fixtures=<relative path> swaps the source (e.g. a test file
    // with finished games). Restricted to same-origin relative paths.
    const fxOverride = new URLSearchParams(location.search).get('fixtures');
    const fixturesUrl = (fxOverride && !/^(https?:)?\/\//i.test(fxOverride)) ? fxOverride : FIXTURES_URL;
    try {
      const fx = await (await fetch(fixturesUrl + '?t=' + Date.now())).json();
      MATCHES = fx.matches || [];
      if (fx.title) { FIXTURE_TITLE = fx.title; applyLabels(); }
      renderScoringRules();
      renderMatches();
    } catch (e) {
      document.getElementById('matches').innerHTML =
        '<div class="card" style="color:var(--bad)">' + escapeHtml(t('couldNotLoadFixtures')(fixturesUrl)) + '</div>';
    }
    // Leagues, then open the league from ?league= (or the last one used). That
    // loads its player list and resumes a saved session if there is one.
    if (!SCRIPT_URL.startsWith('PASTE')) {
      try {
        await loadLeagues();
        const urlLeague = new URLSearchParams(location.search).get('league');
        const startLg = findLeague(urlLeague) || findLeague(loadLastLeague());
        if (startLg) await selectLeague(startLg.id);
      } catch (e) {
        msg(t('couldNotLoadPlayers'), 'err');
      }
    }
    setupPenListeners();       // delegated handlers for the knockout penalty picker
    updateLiveButton();
    // Auto-pull live scores on load when a game is in progress — this also makes
    // the "ESPN already final but JSON not refreshed yet" promotion survive reloads.
    if (MATCHES.some(isLive)) fetchLiveScores(true);
    setInterval(tick, 1000);   // live clock + auto-lock games as their kickoff passes
  }

  // Repopulate the "who are you?" dropdown, keeping the placeholder option
  // (the only <option> with a data-i18n key).
  function setPlayers(players) {
    const sel = document.getElementById('player');
    sel.querySelectorAll('option:not([data-i18n])').forEach(o => o.remove());
    (players || []).forEach(p => {
      const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o);
    });
  }

  // Fetch the public league list (id + display name) and fill the league picker.
  async function loadLeagues() {
    const data = await fetch(SCRIPT_URL + '?action=leagues').then(r => r.json());
    LEAGUES = data.leagues || [];
    const sel = document.getElementById('leagueSelect');
    sel.querySelectorAll('option:not([data-i18n])').forEach(o => o.remove());
    LEAGUES.forEach(l => {
      const o = document.createElement('option'); o.value = l.id; o.textContent = l.name; sel.appendChild(o);
    });
  }

  // Switch to a league: load its names, reset any prior login, and resume this
  // league's saved session if there is one.
  async function selectLeague(id) {
    const lg = findLeague(id);
    if (!lg) return;
    LEAGUE = lg.id; LEAGUE_NAME = lg.name;
    saveLastLeague(LEAGUE);
    document.getElementById('leagueSelect').value = LEAGUE;
    document.getElementById('leagueGated').style.display = '';
    // Reset prior login state when (re)entering a league.
    AUTH = null; guessesLoaded = false; SHEET.guesses = []; playersLoaded = false;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('player').value = '';
    document.getElementById('loginRow').style.display = 'none';
    applyUserPicks(null, []);   // clear any previous league's picks from the inputs
    try { setPlayers(await loadPlayers(true)); }
    catch (e) { msg(t('couldNotLoadPlayers'), 'err'); }
    // Placeholder badge while we verify a saved token for this league.
    const tok = loadToken(LEAGUE);
    if (tok) {
      const badge = document.getElementById('playerBadge');
      badge.textContent = t('retrievingLogin'); badge.style.display = '';
    } else {
      updatePlayerBadge();
    }
    await resumeSession();   // logs in if the token is valid; else clears the placeholder
  }

  // League-picker handler.
  function onLeagueChosen() {
    clearMsg('addMsg');
    const id = document.getElementById('leagueSelect').value;
    if (!id) {
      LEAGUE = null; LEAGUE_NAME = ''; AUTH = null;
      document.getElementById('leagueGated').style.display = 'none';
      document.getElementById('submitBtn').disabled = true;
      applyUserPicks(null, []); updatePlayerBadge();
      return;
    }
    selectLeague(id);
  }

  // Self-service account creation: needs the league's join password. On success
  // the backend returns a session token + the refreshed player list for the league.
  async function addMe() {
    const input = document.getElementById('newName');
    const pwInput = document.getElementById('newPw');
    const leaguePwInput = document.getElementById('leaguePw');
    const name = input.value.trim();
    const pw = pwInput.value;
    const leaguePw = leaguePwInput.value;
    if (!LEAGUE) { addMsg(t('leagueRequired'), 'err'); return; }
    if (!name) { addMsg(t('addErrEmpty'), 'err'); return; }
    if (!pw) { addMsg(t('needPassword'), 'err'); return; }
    if (SCRIPT_URL.startsWith('PASTE')) { addMsg(t('setScriptUrl'), 'err'); return; }

    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'addPlayer', league: LEAGUE, name: name, password: pw, leaguePassword: leaguePw })
      });
      const data = await res.json();
      if (data.ok) {
        AUTH = { name: data.name, token: data.token, links: data.links || [] };   // logged in with a session token
        saveToken(data.league, data.token);
        guessesLoaded = false;
        clearMsg('addMsg');   // drop any earlier error
        input.value = ''; pwInput.value = ''; leaguePwInput.value = '';
        // Refresh the player list so the new name shows up everywhere; fall back
        // to the add response's list if the refetch fails.
        let players = data.players;
        try { players = await loadPlayers(true); } catch (e) { /* keep response list */ }
        setPlayers(players);
        document.getElementById('player').value = data.name;
        document.getElementById('submitBtn').disabled = false;
        await syncPlayer();   // badge + (empty) prefill, loads this user's guesses
        showTab('predict');   // switch only after the add + reload finished
      } else {
        const codes = { empty: 'addErrEmpty', no_password: 'needPassword',
          bad_league_password: 'badLeaguePassword', bad_league: 'leagueRequired',
          duplicate: 'addErrDuplicate' };
        addMsg(t(codes[data.error] || 'addFailed'), 'err');
      }
    } catch (e) {
      addMsg(t('addFailed'), 'err');
    }
    btn.disabled = false;
  }

  // Returning player: verify the password for the selected name in this league.
  async function login() {
    const name = document.getElementById('player').value;
    const pw = document.getElementById('loginPw').value;
    if (!LEAGUE) { addMsg(t('leagueRequired'), 'err'); return; }
    if (!name) return;
    if (!pw) { addMsg(t('needPassword'), 'err'); return; }
    if (SCRIPT_URL.startsWith('PASTE')) { addMsg(t('setScriptUrl'), 'err'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'auth', league: LEAGUE, name: name, password: pw })
      });
      const data = await res.json();
      if (data.ok) {
        AUTH = { name: data.name, token: data.token, links: data.links || [] };
        saveToken(data.league, data.token);
        guessesLoaded = false;
        clearMsg('addMsg');   // drop any earlier "wrong password" error
        document.getElementById('loginPw').value = '';
        document.getElementById('loginRow').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        await syncPlayer();
        showTab('predict');
      } else {
        addMsg(t(data.error === 'bad_password' ? 'badPassword' : 'addFailed'), 'err');
      }
    } catch (e) {
      addMsg(t('addFailed'), 'err');
    }
    btn.disabled = false;
  }

  // Restore the current league's saved session token so the user stays logged in.
  async function resumeSession() {
    const tok = loadToken(LEAGUE);
    if (!tok || SCRIPT_URL.startsWith('PASTE')) { updatePlayerBadge(); return; }
    try {
      const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'resume', token: tok }) });
      const data = await res.json();
      if (data.ok) {
        const lg = findLeague(data.league);
        if (lg) { LEAGUE = lg.id; LEAGUE_NAME = lg.name; }
        AUTH = { name: data.name, token: data.token, links: data.links || [] };
        saveToken(LEAGUE, data.token);  // sliding expiry
        guessesLoaded = false;
        document.getElementById('submitBtn').disabled = false;
        await syncPlayer();
        showTab('predict');
      } else {
        clearToken(LEAGUE);             // expired / invalid → forget it
        updatePlayerBadge();            // remove the "retrieving" placeholder
      }
    } catch (e) {
      updatePlayerBadge();              // transient/offline — clear placeholder, keep token for next load
    }
  }

  function logout() {
    if (LEAGUE) clearToken(LEAGUE);   // forget this league's session (stay in the league)
    AUTH = null;
    guessesLoaded = false;
    SHEET.guesses = [];
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('player').value = '';
    applyUserPicks(null, []);   // clear inputs
    updatePlayerBadge();        // hide badge + logout button
    showTab('who');
  }

  // Public player list for the current league (dropdown) — cached; force=true refetches.
  async function loadPlayers(force) {
    if (SCRIPT_URL.startsWith('PASTE') || !LEAGUE) return SHEET.players;
    if (playersLoaded && !force) return SHEET.players;
    const cfg = await fetch(SCRIPT_URL + '?league=' + encodeURIComponent(LEAGUE)).then(r => r.json());
    SHEET.players = cfg.players || [];
    playersLoaded = true;
    return SHEET.players;
  }

  // Guesses are PRIVATE: fetched only when logged in, and the server returns
  // just YOUR picks plus everyone's picks for already-locked games. Cached until
  // a submit/reload/new-login invalidates it (guessesLoaded = false).
  async function loadGuesses(force) {
    if (!AUTH || SCRIPT_URL.startsWith('PASTE')) { SHEET.guesses = []; guessesLoaded = false; return SHEET.guesses; }
    if (guessesLoaded && !force) return SHEET.guesses;
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'guesses', token: AUTH.token })
    });
    const data = await res.json();
    SHEET.guesses = data.ok ? (data.guesses || []) : [];
    guessesLoaded = !!data.ok;
    return SHEET.guesses;
  }

  // Reflect a just-saved submission in the cache (mirrors the backend's
  // overwrite of this player's picks for the submitted matches), so we don't
  // need a network round-trip to show fresh data.
  function updateCacheGuesses(player, submitted) {
    const ids = new Set(submitted.map(g => g.matchId));
    SHEET.guesses = SHEET.guesses.filter(g => !(g.player === player && ids.has(g.matchId)));
    submitted.forEach(g => SHEET.guesses.push({ player: player, matchId: g.matchId, home: g.home, away: g.away }));
  }

  // Manual refresh: refetch the sheet and re-render whatever's on screen.
  async function reloadData() {
    if (SCRIPT_URL.startsWith('PASTE')) return;
    const btn = document.getElementById('reloadBtn');
    const sel = document.getElementById('player');
    const keep = AUTH ? AUTH.name : sel.value;
    if (btn) btn.disabled = true;
    try {
      await loadPlayers(true);
      guessesLoaded = false;            // force a fresh private fetch
      setPlayers(SHEET.players);
      if (keep && SHEET.players.includes(keep)) sel.value = keep;
      await syncPlayer();               // re-apply picks + badge for the logged-in player
      const tab = visibleDataTab();
      if (tab) await tab.onShow();       // re-render the open data tab from fresh cache
    } catch (e) { /* keep showing the last good data */ }
    if (btn) btn.disabled = false;
  }

  // Fill the score inputs with `player`'s saved picks, clearing every other
  // input first (so switching names never leaves a previous person's picks).
  function applyUserPicks(player, guesses) {
    document.querySelectorAll('#matches input[data-id]').forEach(inp => { inp.value = ''; });
    document.querySelectorAll('#matches .penbtn').forEach(b => b.classList.remove('active'));
    if (!player) {
      document.querySelectorAll('#matches .penrow').forEach(r => r.style.display = 'none');
      return;
    }
    guesses.filter(g => g.player === player).forEach(g => {
      ['home', 'away'].forEach(side => {
        const inp = document.querySelector('#matches input[data-id="' + g.matchId + '"][data-side="' + side + '"]');
        if (inp) inp.value = g[side];
      });
      setPenaltyPick(g.matchId, g.penaltyWinner);
      updatePenRow(g.matchId);
    });
  }

  // Reflect the logged-in player everywhere: the global "You play as …" badge
  // plus their pre-filled picks. No tab change (used on reload too).
  async function syncPlayer() {
    updatePlayerBadge();
    if (!AUTH || SCRIPT_URL.startsWith('PASTE')) { applyUserPicks(null, []); return; }
    try {
      await loadGuesses();
      applyUserPicks(AUTH.name, SHEET.guesses);
      if (FAV_GUESS) applyFavGuesses();   // ?fav_guess=1 gimmick — see below
    } catch (e) { /* leave inputs as-is if guesses can't be loaded */ }
  }

  // Gimmick (?fav): fill every unlocked game that has betting odds with
  // 2–1 for the bookies' favourite (1–1 if the two sides are exactly level).
  // Only fills the inputs — nothing is submitted. Edits captured as drafts so a
  // re-render keeps them.
  function applyFavGuesses() {
    MATCHES.forEach(m => {
      if (isLocked(m)) return;
      const ml = m.odds && m.odds.moneyline;
      const h = ml ? mlToProb(ml.home) : null, a = ml ? mlToProb(ml.away) : null;
      if (h == null || a == null) return;   // no usable win odds for this game
      const hg = h > a ? 2 : h < a ? 1 : 1;   // 2-1 for the favourite; 1-1 if dead level
      const ag = h > a ? 1 : h < a ? 2 : 1;
      const hIn = document.querySelector('#matches input[data-id="' + m.id + '"][data-side="home"]');
      const aIn = document.querySelector('#matches input[data-id="' + m.id + '"][data-side="away"]');
      if (hIn && aIn) { hIn.value = hg; aIn.value = ag; updatePenRow(m.id); }
    });
  }

  // Player-tab dropdown handler: a returning player must enter their password
  // (shown here) before they're logged in — see login().
  function onPlayerChosen() {
    clearMsg('addMsg');
    const name = document.getElementById('player').value;
    const loginRow = document.getElementById('loginRow');
    if (!name) { loginRow.style.display = 'none'; return; }
    document.getElementById('loginUser').value = name;   // ties the saved password to this player
    loginRow.style.display = '';
    const pw = document.getElementById('loginPw');
    pw.value = '';
    pw.type = 'password';                                 // reset reveal state
    const tog = loginRow.querySelector('.pw-toggle');
    if (tog) setPwToggle(tog, false);
    pw.focus();
  }

  // linked players are listed as extra rows (their picks save together).

      // Linked accounts are clickable: switch into them without their password.

          '" data-name="' + escapeHtml(l.name) + '" title="' + escapeHtml(t('switchRole')) + '">🔗 ' +
          escapeHtml(l.name) + ' <span class="badge-league">(' + leagueOf(l.league) + ')</span></div>';
      });

  // Badge click: a linked row switches into that account; the rest opens Login.
  function onBadgeClick(e) {
    const sw = e.target.closest('.badge-switch');
    if (sw) { switchToLink(sw.dataset.league, sw.dataset.name); return; }
